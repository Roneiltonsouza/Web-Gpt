<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web GPT - Cadastro Único</title>
    <style>
        :root { --led-green: #00ff00; }
        body { background: #0a0a0a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { width: 300px; text-align: center; }
        
        /* O LED que você pediu */
        .led { width: 60px; height: 60px; border-radius: 50%; background: #333; border: 3px solid #fff; margin: 20px auto; cursor: pointer; }
        .led.piscando { background: var(--led-green); box-shadow: 0 0 20px var(--led-green); animation: piscar 0.8s infinite alternate; }
        @keyframes piscar { from { opacity: 0.3; } to { opacity: 1; } }
        
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; background: #111; color: white; text-align: center; border: 1px solid #333; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 12px; background: #800080; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="box">
    <h1>WEB GPT</h1>
    <div id="led" class="led" onclick="gerarCadastroUnico()"></div>
    <p id="status">CLIQUE NO LED PARA ATIVAR ID ÚNICO</p>
    
    <input type="number" id="id-input" placeholder="ID (10 DÍGITOS)">
    <button onclick="logarComId()">LOGIN EM QUALQUER DISPOSITIVO</button>
</div>

<script>
    const API_KEY = "-OngH8WRkvXaOgMmFeZo";
    const API_URL = "SUA_URL_DO_NETBASE"; // COLOQUE AQUI SUA URL

    // 1. CADASTRO ÚNICO (Gera, Grava e Liga o LED)
    async function gerarCadastroUnico() {
        const novoId = Math.floor(1000000000 + Math.random() * 9000000000).toString();
        const led = document.getElementById('led');
        const status = document.getElementById('status');

        try {
            // Grava o ID no banco como ativo
            const res = await fetch(`${API_URL}/${novoId}.json?auth=${API_KEY}`, {
                method: 'PUT',
                body: JSON.stringify({ ativado: true, contatos: [] })
            });

            if (res.ok) {
                document.getElementById('id-input').value = novoId;
                led.classList.add('piscando'); // LED VERDE E PISCANDO
                status.innerText = "ID ATIVO NO SISTEMA!";
            } else {
                alert("Erro ao ativar. Verifique se a URL está correta.");
            }
        } catch (e) {
            alert("Erro de Conexão com API.");
        }
    }

    // 2. LOGIN (Busca o ID que já está lá)
    async function logarComId() {
        const id = document.getElementById('id-input').value;
        if(id.length !== 10) return alert("ID inválido!");

        const res = await fetch(`${API_URL}/${id}.json?auth=${API_KEY}`);
        const data = await res.json();

        if (data && data.ativado === true) {
            alert("Login bem-sucedido! Sincronizando dados...");
            // Aqui você redireciona para o app
        } else {
            alert("ID não encontrado no sistema.");
        }
    }
</script>
</body>
</html>
