<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web GPT Pro - Perfil Oficial</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --led-green: #00ff00; --primary: #800080; --orange: #ffa500; --led-blue: #00fbff; }
        * { box-sizing: border-box; touch-action: none; outline: none; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: sans-serif; overflow: hidden; position: fixed; }

        .app-main { display: flex; flex-direction: column; width: 100%; height: 100%; background: linear-gradient(180deg, #1e56a0 0%, #163e75 100%); position: relative; }

        /* BARRA PRETA E TITULO PERFIL */
        .notch { 
            width: 200px; height: 35px; background: #000; 
            border-bottom-left-radius: 18px; border-bottom-right-radius: 18px; 
            margin: 0 auto; z-index: 10000; border: 1px solid #333;
            display: flex; align-items: center; justify-content: space-between; padding: 0 10px;
        }
        .label-perfil { width: 100%; text-align: center; color: white; font-size: 14px; font-weight: bold; padding: 5px 0; background: rgba(0,0,0,0.3); letter-spacing: 2px; }
        
        #my-header-pic { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; border: 1px solid var(--led-blue); cursor: pointer; }

        .header { height: 40px; padding: 0 15px; display: flex; align-items: center; justify-content: space-between; position: absolute; top: 40px; width: 100%; z-index: 9000; }
        #meu-id-txt { color: var(--led-green); font-weight: bold; font-size: 0.75em; text-shadow: 0 0 5px #000; }

        .visor { flex: 1; position: relative; overflow: hidden; }
        
        /* MODAL PERFIL TAMANHO REAL */
        #view-perfil-full { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 50000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        #view-perfil-full img { width: 250px; height: 250px; border-radius: 20px; border: 3px solid var(--primary); object-fit: cover; box-shadow: 0 0 20px var(--led-blue); }
        #nome-perfil-full { color: white; margin-top: 20px; font-size: 22px; font-weight: bold; text-transform: uppercase; }

        #screen-login { position: fixed; inset: 0; background: #000; z-index: 20000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .dropdown-menu { position: absolute; top: 85px; left: 10px; background: rgba(0,0,0,0.95); border: 1px solid var(--primary); border-radius: 15px; width: 220px; display: none; z-index: 11000; }
        .dropdown-item { padding: 15px; border-bottom: 1px solid #222; color: var(--orange); font-size: 0.9em; font-weight: bold; }
        
        .floating-contact { position: absolute; width: 120px; background: rgba(0,0,0,0.8); border-radius: 15px; padding: 10px; text-align: center; border: 1px solid var(--primary); z-index: 100; }
    </style>
</head>
<body>

<div class="app-main">
    <div class="notch">
        <img id="my-header-pic" src="https://via.placeholder.com/100" onclick="verPerfilReal()">
        <div onclick="document.getElementById('my-photo-input').click()" style="color:white; font-size:16px;">📷</div>
    </div>
    <div class="label-perfil">PERFIL</div>

    <div class="header">
        <div onclick="toggleMenu()" style="font-size:1.4em; cursor:pointer;">⚙️</div>
        <div id="meu-id-txt">ID: ...</div>
    </div>

    <div class="visor" id="visor-container">
        <div id="list-contatos" style="display:none; position:absolute; inset:0; background:rgba(0,0,0,0.95); z-index:15000; padding:20px;">
             <button onclick="document.getElementById('list-contatos').style.display='none'" style="width:100%; padding:12px; background:red; color:white; border:none; border-radius:10px; font-weight:bold; margin-bottom:15px;">VOLTAR</button>
             <div id="contatos-render"></div>
        </div>
        <div id="contatos-na-tela"></div>
    </div>

    <div class="camera-footer" style="height:60px; display:flex; justify-content:center; align-items:center; background:rgba(0,0,0,0.4);">
        <div style="width:60px; height:35px; background:#b30000; border-radius:10px; border:2px solid #500;" onclick="abrirAgenda()"></div>
    </div>
</div>

<div id="view-perfil-full" onclick="this.style.display='none'">
    <img id="img-real" src="">
    <div id="nome-perfil-full">NOME</div>
    <p style="color:gray; font-size:12px; margin-top:30px;">Toque para sair</p>
</div>

<input type="file" id="my-photo-input" accept="image/*" style="display:none" onchange="salvarFoto(this)">

<div id="screen-login">
    <h1 style="color:var(--primary)">WEB GPT PRO</h1>
    <input type="text" id="input-nome" placeholder="SEU NOME" style="width:85%; padding:15px; border-radius:10px; background:#111; color:white; border:1px solid #333; margin-bottom:10px;">
    <input type="number" id="input-id" placeholder="SEU ID" style="width:85%; padding:15px; border-radius:10px; background:#222; color:var(--led-green); border:none; text-align:center; font-weight:bold;">
    <button onclick="entrar()" style="width:85%; padding:18px; margin-top:20px; background:var(--primary); color:white; border:none; border-radius:12px; font-weight:bold;">ENTRAR NO SISTEMA</button>
</div>

<div id="menu-dropdown" class="dropdown-menu">
    <div class="dropdown-item" onclick="abrirAgenda()">📂 MEUS CONTATOS</div>
    <div class="dropdown-item" onclick="adicionarNovoContato()">👤 NOVO CONTATO (AUTO)</div>
    <div class="dropdown-item" style="color:red" onclick="toggleMenu()">✖ FECHAR</div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaJ4WY8pvL7cAgXIZpSkIDk1Oy4rbsb92mgNN", databaseURL: "https://netbase-cloud-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    
    const hw = navigator.userAgent.replace(/\D/g, "") + screen.width;
    let meuID = "", meuNome = "", minhaFoto = "";

    function verPerfilReal() {
        document.getElementById('img-real').src = minhaFoto || "https://via.placeholder.com/300";
        document.getElementById('nome-perfil-full').innerText = meuNome;
        document.getElementById('view-perfil-full').style.display = 'flex';
    }

    function salvarFoto(input) {
        const reader = new FileReader();
        reader.onload = e => {
            minhaFoto = e.target.result;
            document.getElementById('my-header-pic').src = minhaFoto;
            if(meuID) database.ref('perfis/'+meuID).update({ foto: minhaFoto });
        };
        reader.readAsDataURL(input.files[0]);
    }

    async function entrar() {
        meuID = document.getElementById('input-id').value;
        meuNome = document.getElementById('input-nome').value;
        if(!meuID || !meuNome) return alert("Preencha tudo!");

        const snap = await database.ref('perfis/'+meuID).once('value');
        if(snap.exists() && snap.val().hw && snap.val().hw !== hw) return alert("Acesso negado: Outro aparelho!");

        if(snap.exists() && snap.val().foto) {
            minhaFoto = snap.val().foto;
            document.getElementById('my-header-pic').src = minhaFoto;
        }

        database.ref('perfis/'+meuID).update({ nome: meuNome, hw: hw });
        document.getElementById('screen-login').style.display = 'none';
        document.getElementById('meu-id-txt').innerText = "ID: " + meuID;
        sincronizarContatos();
    }

    // ADICIONAR CONTATO AUTOMÁTICO
    function adicionarNovoContato() {
        const nomeC = prompt("Nome do Contato:");
        const idC = prompt("ID do Contato:");
        if(nomeC && idC) {
            database.ref('agenda/' + meuID + '/' + idC).set({
                id: idC,
                nome: nomeC
            }).then(() => alert("Contato salvo automaticamente!"));
        }
        toggleMenu();
    }

    function sincronizarContatos() {
        database.ref('agenda/' + meuID).on('value', snap => {
            const render = document.getElementById('contatos-render');
            render.innerHTML = "";
            snap.forEach(c => {
                const con = c.val();
                render.innerHTML += `
                    <div style="padding:15px; border-bottom:1px solid #333; color:white; font-weight:bold; display:flex; justify-content:space-between;" onclick="fixarNaTela('${con.nome}','${con.id}')">
                        <span>${con.nome}</span>
                        <span style="color:var(--led-green)">ID: ${con.id}</span>
                    </div>`;
            });
        });
    }

    function fixarNaTela(nome, id) {
        document.getElementById('list-contatos').style.display = 'none';
        const card = document.createElement('div');
        card.className = 'floating-contact';
        card.style.top = "150px"; card.style.left = "30px";
        card.innerHTML = `
            <div style="color:white; font-size:12px; font-weight:bold;">${nome}</div>
            <div style="color:var(--led-blue); font-size:10px; margin:5px 0;">${id}</div>
            <button onclick="this.parentElement.remove()" style="background:none; border:none; color:red; font-size:10px;">FECHAR</button>
        `;
        document.getElementById('contatos-na-tela').appendChild(card);
    }

    function abrirAgenda() { document.getElementById('list-contatos').style.display = 'block'; }
    function toggleMenu() { const m = document.getElementById('menu-dropdown'); m.style.display = (m.style.display === 'block') ? 'none' : 'block'; }
</script>
</body>
</html>
