<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web GPT Pro - Firebase Lock</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --led-green: #00ff00; --primary: #800080; --orange: #ffa500; --led-blue: #00fbff; --led-red: #ff0000; }
        * { box-sizing: border-box; touch-action: none; outline: none; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: sans-serif; overflow: hidden; position: fixed; }

        .app-main { display: flex; flex-direction: column; width: 100%; height: 100%; background: linear-gradient(180deg, #1e56a0 0%, #163e75 100%); }

        .notch { 
            width: 210px; height: 45px; margin: 0 auto;
            background: linear-gradient(90deg, #000 0%, #fff 33%, #ffa500 66%, #800080 100%);
            border-bottom-left-radius: 25px; border-bottom-right-radius: 25px; 
            display: flex; align-items: center; justify-content: center; gap: 10px; border: 2px solid #333;
        }
        
        .led-status { width: 8px; height: 8px; border-radius: 50%; background: var(--led-red); }
        .led-active { background: var(--led-green) !important; box-shadow: 0 0 8px var(--led-green); }

        #screen-login { position: fixed; inset: 0; background: #000; z-index: 20000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .input-style { width: 80%; padding: 12px; margin-top: 10px; border-radius: 10px; border: 1px solid var(--primary); background: #111; color: white; text-align: center; }
        .btn-main { width: 80%; padding: 15px; margin-top: 25px; background: var(--primary); color: white; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-main">
    <div class="notch">
        <div id="led-ativo" class="led-status"></div>
        <div id="label-nome-topo" style="font-size: 11px; font-weight: bold;">PERFIL</div>
    </div>
    <div style="flex:1; display:flex; align-items:center; justify-content:center;">
        <video id="video-remote" style="width:100%; height:100%; object-fit:cover;" autoplay playsinline></video>
    </div>
</div>

<div id="screen-login">
    <h2 style="color:var(--primary)">SISTEMA DE ACESSO</h2>
    
    <div id="user-info-preview" style="text-align:center; margin-bottom:15px;">
        <div id="foto-frame" style="width:80px; height:80px; border-radius:50%; border:2px solid #fff; margin:0 auto; overflow:hidden; background:#222;">
            <img id="preview-foto-login" src="" style="display:none; width:100%; height:100%; object-fit:cover;">
        </div>
    </div>

    <input type="text" id="input-nome" class="input-style" placeholder="Nome do Usuário">
    <input type="number" id="input-id" class="input-style" placeholder="Digite seu ID Único">
    
    <button class="btn-main" onclick="entrar()">AUTENTICAR ACESSO</button>
    <button onclick="gerarNovoID()" style="background:none; border:1px solid gray; color:gray; padding:5px; margin-top:15px; border-radius:5px; font-size:10px;">CRIAR NOVO ID ÚNICO</button>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaJ4WY8pvL7cAgXIZpSkIDk1Oy4rbsb92mgNN", databaseURL: "https://netbase-cloud-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // Gera uma "assinatura" única para este navegador/celular
    const fingerprint = navigator.userAgent + (screen.height * screen.width);

    function gerarNovoID() {
        const novoId = Math.floor(100000 + Math.random() * 900000);
        document.getElementById('input-id').value = novoId;
        alert("Novo ID gerado: " + novoId + "\nEste ID ficará preso a este aparelho após o primeiro login.");
    }

    async function entrar() {
        const id = document.getElementById('input-id').value;
        const nome = document.getElementById('input-nome').value;

        if(!id || !nome) return alert("Preencha os campos!");

        const userRef = database.ref('perfis/' + id);
        const snap = await userRef.once('value');

        if(snap.exists()) {
            const dados = snap.val();
            
            // TRAVA DE SEGURANÇA NO FIREBASE
            // Verifica se o aparelho que está tentando logar é o mesmo que criou a conta
            if(dados.device_lock && dados.device_lock !== fingerprint) {
                alert("ACESSO NEGADO: Este ID pertence a outro dispositivo!");
                return;
            }
            
            // Se o ID existe mas não tinha trava, a gente tranca agora (Proteção de primeiro acesso)
            if(!dados.device_lock) {
                userRef.update({ device_lock: fingerprint });
            }
        } else {
            // CRIAÇÃO DE CONTA (Primeiro Acesso)
            // Registra o ID e já tranca o dispositivo imediatamente
            userRef.set({
                nome: nome,
                device_lock: fingerprint,
                online: true,
                criado_em: Date.now()
            });
        }

        // Se passou pela trava, inicia o sistema
        finalizarLogin(id, nome);
    }

    function finalizarLogin(id, nome) {
        document.getElementById('screen-login').style.display = 'none';
        document.getElementById('label-nome-topo').innerText = nome;
        document.getElementById('led-ativo').classList.add('led-active');
        
        const peer = new Peer(id);
        peer.on('open', () => console.log("Conectado com ID: " + id));
        
        // Mantém status online no Firebase
        database.ref('perfis/' + id).update({ online: true });
        database.ref('perfis/' + id + '/online').onDisconnect().set(false);
    }
</script>
</body>
</html>
