<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web GPT Pro - Full Edition</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --led-green: #00ff00; --primary: #800080; --orange: #ffa500; --led-blue: #00fbff; }
        * { box-sizing: border-box; touch-action: none; outline: none; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: sans-serif; overflow: hidden; position: fixed; }

        .app-main { display: flex; flex-direction: column; width: 100%; height: 100%; background: #000; }

        /* DIVISÃO DO CABEÇALHO */
        .notch-container { 
            display: flex; flex-direction: column; align-items: center; 
            z-index: 10000; background: #000; padding-bottom: 8px;
        }
        .notch { 
            width: 210px; height: 45px; 
            background: linear-gradient(90deg, #000 0%, #fff 33%, #ffa500 66%, #800080 100%);
            border-bottom-left-radius: 25px; border-bottom-right-radius: 25px; 
            border: 2px solid #333; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        
        /* DIVISÃO DA TELA (AZUL) */
        .visor { 
            flex: 1; position: relative; overflow: hidden; 
            background: linear-gradient(180deg, #1e56a0 0%, #163e75 100%); 
        }

        /* VÍDEO EM TODA A TELA AZUL */
        #video-remote { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            object-fit: cover; z-index: 1; 
        }
        
        #video-local { 
            width: 85px; height: 120px; position: absolute; top: 10px; right: 10px; 
            border: 2px solid var(--primary); z-index: 100; display: none; border-radius: 12px; object-fit: cover; 
        }

        #contatos-na-tela { position: absolute; inset: 0; z-index: 50; pointer-events: none; }
        .floating-contact, .floating-img { 
            position: absolute; width: 120px; background: rgba(0,0,0,0.85); 
            border-radius: 15px; padding: 10px; text-align: center; border: 1px solid var(--primary); 
            pointer-events: auto; z-index: 60;
        }
        .floating-img img { width: 100%; border-radius: 10px; display: block; }

        .aba-menu {
            position: absolute; left: 0; top: 130px; background: var(--primary);
            color: white; padding: 12px 6px; border-radius: 0 12px 12px 0;
            font-size: 10px; font-weight: bold; writing-mode: vertical-rl;
            cursor: pointer; z-index: 9500; border: 1px solid var(--led-blue);
        }

        #led-encerrar { 
            display: none; color: var(--led-blue); font-size: 10px; font-weight: bold; 
            margin-top: 5px; animation: blink-led 1s infinite; text-shadow: 0 0 5px var(--led-blue);
        }
        @keyframes blink-led { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }

        #screen-login { position: fixed; inset: 0; background: #000; z-index: 20000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #view-perfil-full { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 50000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .dropdown-menu { position: absolute; top: 130px; left: 0; background: rgba(0,0,0,0.95); border: 1px solid var(--primary); border-radius: 0 15px 15px 0; width: 200px; display: none; z-index: 11000; }
        .dropdown-item { padding: 15px; border-bottom: 1px solid #222; color: var(--orange); font-weight: bold; }
    </style>
</head>
<body>

<div class="app-main">
    <div class="notch-container">
        <div class="notch" onclick="abrirConfigPerfil()">
            <img id="header-pic-circle" src="" style="width:32px; height:32px; border-radius:50%; object-fit:cover; border:2px solid #000;">
            <div class="info-notch">
                <span id="label-nome-topo" style="color:#000; font-size:11px; font-weight:bold;">PERFIL</span>
                <span id="label-id-topo" style="color:#000; font-size:10px; font-weight:bold; display:block;">ID: ---</span>
            </div>
        </div>
        <div id="led-encerrar" onclick="encerrarChamada()">ENCERRAR LIGAÇÃO ●</div>
    </div>

    <div class="aba-menu" onclick="toggleMenu()">MENU</div>

    <div class="visor" id="visor-container">
        <video id="video-remote" autoplay playsinline></video>
        <video id="video-local" autoplay playsinline muted></video>
        <div id="contatos-na-tela"></div>
        
        <div id="list-contatos" style="display:none; position:absolute; inset:0; background:rgba(0,0,0,0.98); z-index:15000; padding:20px; overflow-y: auto;">
             <button onclick="document.getElementById('list-contatos').style.display='none'" style="width:100%; padding:15px; background:red; color:white; border:none; border-radius:10px; margin-bottom:15px; font-weight:bold;">VOLTAR</button>
             <div id="contatos-render"></div>
        </div>
    </div>

    <div class="camera-footer" style="height:60px; display:flex; justify-content:center; align-items:center; background:#000; border-top:1px solid #222;">
        <div style="width:50px; height:35px; background:#b30000; border-radius:8px; border:2px solid #500; cursor:pointer;" onclick="abrirAgenda()"></div>
    </div>
</div>

<div id="screen-login">
    <h2 style="color:var(--primary)">WEB GPT PRO</h2>
    <input type="text" id="input-nome" placeholder="NOME" style="width:80%; padding:12px; margin-top:20px; border-radius:10px; background:#111; color:white; border:1px solid var(--primary); text-align:center;">
    <input type="number" id="input-id" oninput="buscarDadosAuto(this.value)" placeholder="ID" style="width:80%; padding:12px; margin-top:10px; border-radius:10px; background:#222; color:var(--led-green); text-align:center;">
    <button onclick="entrar()" style="width:80%; padding:15px; margin-top:30px; background:var(--primary); color:white; border:none; border-radius:15px; font-weight:bold;">ACESSAR</button>
</div>

<div id="view-perfil-full">
    <img id="img-full-edit" src="" style="width:180px; height:180px; border-radius:20px; border:3px solid var(--orange); object-fit:cover;">
    <button class="btn-perfil-opt" style="background:var(--primary); color:white;" onclick="document.getElementById('change-photo-input').click()">MUDAR FOTO</button>
    <button class="btn-perfil-opt" style="background:var(--orange); color:black;" onclick="document.getElementById('gallery-to-screen').click()">IMAGEM NA TELA</button>
    <button class="btn-perfil-opt" style="background:#333; color:white;" onclick="fecharPerfil()">FECHAR</button>
</div>

<div id="menu-dropdown" class="dropdown-menu">
    <div class="dropdown-item" onclick="abrirAgenda()">📂 AGENDA</div>
    <div class="dropdown-item" onclick="novoContatoModal()">👤 NOVO CONTATO</div>
    <div class="dropdown-item" style="color:red" onclick="toggleMenu()">✖ FECHAR</div>
</div>

<input type="file" id="change-photo-input" accept="image/*" style="display:none" onchange="processarFoto(this)">
<input type="file" id="gallery-to-screen" accept="image/*" style="display:none" onchange="imgParaTela(this)">

<script>
    const firebaseConfig = { apiKey: "AIzaJ4WY8pvL7cAgXIZpSkIDk1Oy4rbsb92mgNN", databaseURL: "https://netbase-cloud-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    let peer, localStream, currentCall, meuID = "", minhaFoto = "", meuNome = "";

    async function entrar() {
        meuID = document.getElementById('input-id').value;
        meuNome = document.getElementById('input-nome').value;
        if(!meuID || !meuNome) return;
        peer = new Peer(meuID);
        peer.on('open', () => {
            document.getElementById('screen-login').style.display = 'none';
            document.getElementById('label-nome-topo').innerText = meuNome;
            document.getElementById('label-id-topo').innerText = "ID: " + meuID;
            ativarCamera(); sincronizarContatos();
        });
        peer.on('call', call => {
            if(confirm("Atender?")) {
                call.answer(localStream);
                call.on('stream', s => { document.getElementById('video-remote').srcObject = s; });
                currentCall = call;
                document.getElementById('led-encerrar').style.display = 'block';
            }
        });
    }

    function ligarPara(id, btn) {
        btn.style.visibility = "hidden";
        document.getElementById('led-encerrar').style.display = 'block';
        const call = peer.call(id, localStream);
        call.on('stream', s => { document.getElementById('video-remote').srcObject = s; });
        currentCall = call;
    }

    function encerrarChamada() {
        if(currentCall) currentCall.close();
        document.getElementById('video-remote').srcObject = null;
        document.getElementById('led-encerrar').style.display = 'none';
        document.querySelectorAll('.blink-call').forEach(b => b.style.visibility = "visible");
    }

    function imgParaTela(input) {
        const reader = new FileReader();
        reader.onload = e => {
            const card = document.createElement('div');
            card.className = 'floating-img';
            card.style.top = "150px"; card.style.left = "50px";
            card.innerHTML = `<img src="${e.target.result}"><button onclick="this.parentElement.remove()" style="width:100%; background:red; color:white; border:none; border-radius:5px; font-size:10px; margin-top:5px; padding:5px;">SAIR</button>`;
            
            let startX = 0; card.ontouchstart = ev => startX = ev.touches[0].clientX;
            card.ontouchmove = ev => {
                if(ev.touches[0].clientX - startX > 80) { card.style.transform = "translateX(250%)"; setTimeout(() => card.remove(), 250); }
            };
            document.getElementById('contatos-na-tela').appendChild(card);
            fecharPerfil();
        };
        reader.readAsDataURL(input.files[0]);
    }

    function fixarNaTela(nome, id, foto) {
        document.getElementById('list-contatos').style.display = 'none';
        const card = document.createElement('div');
        card.className = 'floating-contact';
        card.style.top = "100px"; card.style.left = "20px";
        card.innerHTML = `<img src="${foto}" style="width:50px; height:50px; border-radius:50%; object-fit:cover;"><div style="color:white; font-size:10px;">${nome}</div><button onclick="ligarPara('${id}', this)" class="blink-call" style="background:var(--led-green); border:none; border-radius:5px; padding:5px; font-weight:bold; font-size:10px; margin-top:5px;">LIGAR</button>`;
        document.getElementById('contatos-na-tela').appendChild(card);
    }

    async function ativarCamera() { try { localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true }); document.getElementById('video-local').srcObject = localStream; document.getElementById('video-local').style.display = 'block'; } catch(e) {} }
    function abrirAgenda() { document.getElementById('list-contatos').style.display = 'block'; }
    function abrirConfigPerfil() { document.getElementById('view-perfil-full').style.display = 'flex'; }
    function fecharPerfil() { document.getElementById('view-perfil-full').style.display = 'none'; }
    function toggleMenu() { const m = document.getElementById('menu-dropdown'); m.style.display = (m.style.display === 'block') ? 'none' : 'block'; }
    function sincronizarContatos() {
        database.ref('agenda/' + meuID).on('value', snap => {
            const render = document.getElementById('contatos-render'); render.innerHTML = "";
            snap.forEach(c => {
                const con = c.val();
                render.innerHTML += `<div onclick="fixarNaTela('${con.nome}','${con.id}','${con.foto}')" style="padding:15px; border-bottom:1px solid #333; color:white;">${con.nome}</div>`;
            });
        });
    }
</script>
</body>
</html>
