<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web GPT - Sistema Completo</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --led-green: #00ff00; --bg: #0a0a0a; --primary: #800080; --orange: #ffa500; --rec-red: #ff0000; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .app-container { width: 100%; max-width: 400px; height: 100vh; display: flex; flex-direction: column; position: relative; }
        .screen { display: none; flex-direction: column; height: 100%; width: 100%; }
        .active-screen { display: flex; }
        
        .main-visor { flex-grow: 1; background: #000; border: 2px solid #333; border-radius: 25px; margin: 10px; position: relative; overflow: hidden; background-size: cover; background-position: center; }
        .contacts-list { position: absolute; top: 130px; width: 90%; left: 5%; background: #111; z-index: 500; display: none; border-radius: 10px; border: 1px solid #444; max-height: 250px; overflow-y: auto; }
        .contact-item { padding: 15px; border-bottom: 1px solid #333; color: var(--orange); font-weight: bold; cursor: pointer; }
        .bottom-controls { height: 80px; width: 100%; display: flex; justify-content: space-around; align-items: center; background: #000; border-top: 1px solid #333; flex-shrink: 0; }
        .btn-call { width: 50px; height: 50px; background: var(--rec-red); border-radius: 50%; border: 3px solid white; cursor: pointer; }
        .input-auth { width: 90%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; background: #111; color: white; text-align: center; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="screen-login" class="screen active-screen" style="justify-content:center; align-items:center;">
        <h1>WEB GPT</h1>
        <div id="led-login" onclick="gerarID()" style="width:60px; height:60px; border-radius:50%; border:2px solid #fff; cursor:pointer;"></div>
        <input type="number" id="login-id" class="input-auth" placeholder="SEU ID">
        <button onclick="entrarNoSistema()" style="padding:15px 40px; background:var(--primary); color:white; border:none; border-radius:10px;">ENTRAR</button>
    </div>

    <div id="screen-app" class="screen">
        <div style="padding:15px; background:#000;">
            <input type="text" id="id-amigo" placeholder="Pesquisar ID..." style="width:100%; padding:10px; border-radius:8px;">
            <div style="display:flex; justify-content:space-between; margin-top:10px;">
                <b id="meu-id-txt">ID: ...</b>
                <span onclick="toggleAgenda()" style="color:var(--orange); cursor:pointer;">▼ CONTATOS</span>
            </div>
        </div>

        <div id="contacts-list" class="contacts-list"></div>

        <div class="main-visor" id="visor">
            <video id="video-remote" autoplay playsinline style="width:100%; height:100%; object-fit:cover;"></video>
            <video id="video-local" autoplay playsinline muted style="width:80px; height:120px; position:absolute; top:10px; right:10px; display:none;"></video>
        </div>

        <div class="bottom-controls">
            <div class="btn-call" onclick="chamarAmigo()"></div>
            <div onclick="abrirPopup()" style="font-size:25px; cursor:pointer;">▲</div>
            <div onclick="document.getElementById('img-input').click()" style="font-size:25px; cursor:pointer;">🖼️</div>
            <input type="file" id="img-input" style="display:none" onchange="trocarFundo(event)">
        </div>
    </div>

    <div id="popup-salvar" style="position:absolute; bottom:-100%; left:0; width:100%; height:100%; background:#000; z-index:600; padding:20px; transition:0.3s;">
        <span onclick="fecharPopup()" style="font-size:30px; cursor:pointer;">✕</span>
        <h2>SALVAR NA NUVEM</h2>
        <input type="text" id="save-nome" placeholder="Nome" style="width:100%; padding:10px; margin-bottom:10px;">
        <input type="text" id="save-id" placeholder="ID" style="width:100%; padding:10px;">
        <button onclick="salvarContato()" style="width:100%; padding:15px; margin-top:10px; background:var(--primary); color:white;">SALVAR</button>
    </div>
</div>

<script>
    let peer, localStream;
    let contatos = JSON.parse(localStorage.getItem('minha_agenda')) || [];

    function gerarID() {
        document.getElementById('login-id').value = Math.floor(100000 + Math.random() * 800000);
        document.getElementById('led-login').style.background = "var(--led-green)";
    }

    async function entrarNoSistema() {
        const id = document.getElementById('login-id').value;
        if(!id) return;
        
        localStream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
        document.getElementById('video-local').srcObject = localStream;
        document.getElementById('video-local').style.display = "block";
        
        peer = new Peer(id);
        document.getElementById('meu-id-txt').innerText = "ID: " + id;
        document.getElementById('screen-login').classList.remove('active-screen');
        document.getElementById('screen-app').classList.add('active-screen');
        
        peer.on('call', call => {
            call.answer(localStream);
            call.on('stream', s => document.getElementById('video-remote').srcObject = s);
        });
        renderizarAgenda();
    }

    function chamarAmigo() {
        const tid = document.getElementById('id-amigo').value;
        const call = peer.call(tid, localStream);
        call.on('stream', s => document.getElementById('video-remote').srcObject = s);
    }

    function salvarContato() {
        const nome = document.getElementById('save-nome').value;
        const id = document.getElementById('save-id').value;
        contatos.push({nome, id});
        localStorage.setItem('minha_agenda', JSON.stringify(contatos));
        renderizarAgenda();
        fecharPopup();
    }

    function renderizarAgenda() {
        const list = document.getElementById('contacts-list');
        list.innerHTML = "";
        contatos.forEach(c => {
            const div = document.createElement('div');
            div.className = "contact-item";
            div.innerText = `${c.nome} (${c.id})`;
            div.onclick = () => { 
                document.getElementById('id-amigo').value = c.id; 
                toggleAgenda();
                chamarAmigo(); // CHAMADA AUTOMÁTICA
            };
            list.appendChild(div);
        });
    }

    function toggleAgenda() {
        const list = document.getElementById('contacts-list');
        list.style.display = (list.style.display === "block") ? "none" : "block";
    }

    function abrirPopup() { document.getElementById('popup-salvar').style.bottom = "0"; }
    function fecharPopup() { document.getElementById('popup-salvar').style.bottom = "-100%"; }
    function trocarFundo(e) {
        const reader = new FileReader();
        reader.onload = ev => document.getElementById('visor').style.backgroundImage = `url('${ev.target.result}')`;
        reader.readAsDataURL(e.target.files[0]);
    }
</script>
</body>
</html>
