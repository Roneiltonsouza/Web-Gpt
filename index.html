<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web GPT Oficial</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --led-green: #00ff00; --bg: #000; --primary: #800080; --orange: #ffa500; }
        * { box-sizing: border-box; touch-action: pan-y; }
        body { margin: 0; padding: 0; background: #000; color: white; font-family: sans-serif; height: 100vh; width: 100vw; overflow: hidden; }
        
        .app-container { display: flex; flex-direction: column; height: 100%; width: 100%; }
        #screen-login { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        .header { height: 40px; padding: 0 10px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #222; }
        .actions-bar { height: 45px; display: flex; justify-content: space-around; align-items: center; border-bottom: 1px solid #222; }
        
        .visor { flex: 1; position: relative; background: #000; overflow: hidden; background-size: cover; background-position: center; }
        #video-remote { width: 100%; height: 100%; object-fit: cover; }
        #video-local { width: 80px; height: 110px; position: absolute; bottom: 10px; right: 10px; border: 1px solid white; z-index: 10; display: none; background: #222; }

        .contacts-list { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: none; overflow-y: auto; }
        .contact-item { padding: 20px; border-bottom: 1px solid #333; color: var(--orange); font-weight: bold; cursor: pointer; background: #000; transition: transform 0.2s; position: relative; width: 100%; }

        #incoming-call { position: fixed; top: 20%; left: 5%; width: 90%; background: #222; border: 2px solid var(--primary); border-radius: 15px; padding: 20px; z-index: 6000; display: none; text-align: center; }
        #btn-hangup { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: red; color: white; border: none; padding: 15px 30px; border-radius: 30px; font-weight: bold; z-index: 3000; display: none; border: 2px solid white; }
        
        .btn-accept { background: green; color: white; padding: 15px; border: none; border-radius: 10px; font-weight: bold; margin: 10px; width: 100px; }
        .btn-reject { background: red; color: white; padding: 15px; border: none; border-radius: 10px; font-weight: bold; margin: 10px; width: 100px; }
    </style>
</head>
<body>

<audio id="ringtone" loop src="https://assets.mixkit.co/active_storage/sfx/1358/1358-preview.mp3"></audio>

<div id="screen-login">
    <h1 style="color:var(--primary)">WEB GPT</h1>
    <div id="led-btn" style="width:50px; height:50px; border-radius:50%; border:2px solid #fff; background:#333; cursor:pointer;" onclick="gerarIDUnico()"></div>
    <p style="font-size: 0.7em; margin: 10px 0;">GERAR / ATIVAR</p>
    <input type="number" id="input-id" style="width: 70%; padding: 15px; margin: 10px 0; background: #111; color: white; border: 1px solid #333; text-align: center; border-radius: 10px;" placeholder="ID">
    <button onclick="entrarNoSistema()" style="padding: 12px 40px; background:var(--primary); color:white; border:none; border-radius:8px;">ENTRAR</button>
</div>

<div id="incoming-call">
    <h2 style="color:var(--orange)">CHAMADA...</h2>
    <p id="caller-id"></p>
    <button class="btn-accept" onclick="atenderChamada()">ATENDER</button>
    <button class="btn-reject" onclick="recusarChamada()">RECUSAR</button>
</div>

<button id="btn-hangup" onclick="encerrarChamada()">ENCERRAR CHAMADA</button>

<div class="app-container">
    <div class="header">
        <b id="meu-id-txt">ID: ...</b>
        <span onclick="toggleAgenda()" style="color:var(--orange); cursor:pointer;">▼ CONTATOS</span>
    </div>

    <div class="actions-bar">
        <div style="width:30px; height:30px; background:red; border-radius:50%;" onclick="fazerChamadaDireta()"></div>
        <div style="color:var(--orange);" onclick="salvarNovoContato()">▲ ADICIONAR</div>
        <div onclick="document.getElementById('img-input').click()">🖼️</div>
        <input type="file" id="img-input" style="display:none" onchange="trocarFundo(event)">
    </div>

    <div class="visor" id="visor-container">
        <div id="list-contatos" class="contacts-list"></div>
        <video id="video-remote" autoplay playsinline></video>
        <video id="video-local" autoplay playsinline muted></video>
    </div>
</div>

<script>
    const API_KEY = "OngH8WRkvXaOgMmFeZo";
    let autorizados = JSON.parse(localStorage.getItem('autorizados_' + API_KEY)) || [];
    let contatos = JSON.parse(localStorage.getItem('agenda_' + API_KEY)) || [];
    let peer, localStream, currentCall, vibraInterval;
    const ringtone = document.getElementById('ringtone');

    window.onload = () => {
        // Solicita permissão de notificação para ativar o Badge no ícone
        if ("Notification" in window) {
            Notification.requestPermission();
        }

        const idSalvo = localStorage.getItem('ultimo_id_' + API_KEY);
        if (idSalvo) {
            document.getElementById('input-id').value = idSalvo;
            document.getElementById('led-btn').style.background = 'var(--led-green)';
        }
        const fundoSalvo = localStorage.getItem('fundo_' + API_KEY);
        if(fundoSalvo) document.getElementById('visor-container').style.backgroundImage = `url('${fundoSalvo}')`;
    };

    function gerarIDUnico() {
        const novoID = Math.floor(100000 + Math.random() * 800000).toString();
        document.getElementById('input-id').value = novoID;
        document.getElementById('led-btn').style.background = 'var(--led-green)';
        if(!autorizados.includes(novoID)) autorizados.push(novoID);
        localStorage.setItem('autorizados_' + API_KEY, JSON.stringify(autorizados));
        localStorage.setItem('ultimo_id_' + API_KEY, novoID);
    }

    function entrarNoSistema() {
        const id = document.getElementById('input-id').value;
        if (!autorizados.includes(id.toString())) return alert("ID NÃO AUTORIZADO");
        localStorage.setItem('ultimo_id_' + API_KEY, id);
        
        peer = new Peer(id);
        document.getElementById('meu-id-txt').innerText = "ID: " + id;
        document.getElementById('screen-login').style.display = 'none';
        
        peer.on('call', call => {
            currentCall = call;
            
            // DISPARO DA NOTIFICAÇÃO SILENCIOSA (Para ativar o número no ícone)
            if (Notification.permission === "granted") {
                new Notification("Web GPT: Nova Chamada", {
                    body: "ID: " + call.peer,
                    silent: true, // Garante que não faça som se o app já estiver aberto
                    tag: "call_badge" // Tag para evitar duplicidade
                });
            }

            document.getElementById('incoming-call').style.display = 'block';
            document.getElementById('caller-id').innerText = "De: " + call.peer;
            ringtone.play().catch(()=>{});
            if ("vibrate" in navigator) vibraInterval = setInterval(() => navigator.vibrate([500, 300]), 1000);
        });
        renderizarAgenda();
    }

    // --- SWIPE LOGIC ---
    let touchStartX = 0;
    function handleStart(e) { touchStartX = e.touches[0].clientX; }
    function handleEnd(e, index) {
        let deltaX = e.changedTouches[0].clientX - touchStartX;
        if (deltaX < -80) { 
            if(confirm("Excluir este contato?")) {
                contatos.splice(index, 1);
                localStorage.setItem('agenda_' + API_KEY, JSON.stringify(contatos));
                renderizarAgenda();
            }
        }
    }

    function renderizarAgenda() {
        const lista = document.getElementById('list-contatos');
        lista.innerHTML = contatos.map((c, i) => `
            <div class="contact-item" 
                 ontouchstart="handleStart(event)" 
                 ontouchend="handleEnd(event, ${i})" 
                 onclick="ligarPara('${c.id}')">
                📞 ${c.nome}
            </div>
        `).join('');
    }

    async function atenderChamada() {
        pararNotificacoes();
        await ativarCamera();
        currentCall.answer(localStream);
        vincularStream(currentCall);
    }

    function pararNotificacoes() {
        ringtone.pause(); ringtone.currentTime = 0;
        clearInterval(vibraInterval);
        document.getElementById('incoming-call').style.display = 'none';
    }

    function encerrarChamada() {
        if(currentCall) currentCall.close();
        document.getElementById('btn-hangup').style.display = 'none';
        document.getElementById('video-remote').srcObject = null;
    }

    async function ativarCamera() {
        if (!localStream) {
            localStream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
            document.getElementById('video-local').srcObject = localStream;
            document.getElementById('video-local').style.display = 'block';
        }
    }

    function vincularStream(call) {
        document.getElementById('btn-hangup').style.display = 'block';
        call.on('stream', s => document.getElementById('video-remote').srcObject = s);
        call.on('close', () => encerrarChamada());
    }

    async function ligarPara(idAmigo) {
        toggleAgenda();
        await ativarCamera();
        currentCall = peer.call(idAmigo, localStream);
        vincularStream(currentCall);
    }

    function toggleAgenda() {
        const div = document.getElementById('list-contatos');
        div.style.display = (div.style.display === 'block') ? 'none' : 'block';
    }

    function salvarNovoContato() {
        const nome = prompt("Nome:");
        const id = prompt("ID:");
        if(nome && id) {
            contatos.push({nome, id});
            localStorage.setItem('agenda_' + API_KEY, JSON.stringify(contatos));
            renderizarAgenda();
        }
    }

    function trocarFundo(e) {
        const reader = new FileReader();
        reader.onload = ev => {
            document.getElementById('visor-container').style.backgroundImage = `url('${ev.target.result}')`;
            localStorage.setItem('fundo_' + API_KEY, ev.target.result);
        };
        reader.readAsDataURL(e.target.files[0]);
    }

    function fazerChamadaDireta() {
        const id = prompt("ID para ligar:");
        if(id) ligarPara(id);
    }

    function recusarChamada() { pararNotificacoes(); currentCall.close(); }
</script>
</body>
    </html>
