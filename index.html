<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web GPT Pro - ID Blindado</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --led-green: #00ff00; --primary: #800080; --orange: #ffa500; --led-blue: #00fbff; }
        * { box-sizing: border-box; touch-action: none; outline: none; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: sans-serif; overflow: hidden; position: fixed; }

        .app-main { display: flex; flex-direction: column; width: 100%; height: 100%; background: linear-gradient(180deg, #1e56a0 0%, #163e75 100%); position: relative; }

        /* CABEÇALHO TELA DE FOTO COMPLETA */
        .notch { 
            width: 150px; height: 40px; background: #000; 
            border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; 
            margin: 0 auto; z-index: 10000; overflow: hidden; border: 1px solid #333;
            display: flex; align-items: center; justify-content: center;
        }
        #my-header-pic { width: 100%; height: 100%; object-fit: cover; display: none; }

        .header { height: 45px; padding: 0 15px; display: flex; align-items: flex-start; justify-content: space-between; position: absolute; top: 5px; width: 100%; z-index: 9000; }
        #meu-id-txt { color: var(--led-green); font-weight: bold; font-size: 0.75em; text-shadow: 0 0 5px #000; margin-top: 10px; }

        .visor { flex: 1; position: relative; overflow: hidden; }
        
        /* LOGIN SCREEN */
        #screen-login { position: fixed; inset: 0; background: #000; z-index: 20000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .input-cloud { width: 85%; padding: 15px; border-radius: 12px; border: 1px solid #333; background: #111; color: white; text-align: center; margin-bottom: 10px; }
        
        .btn-base { width: 85%; padding: 18px; margin-top: 10px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--orange); color: var(--orange); }
    </style>
</head>
<body>

<div class="app-main">
    <div class="notch" onclick="document.getElementById('my-photo-input').click()">
        <img id="my-header-pic" src="">
    </div>

    <div class="header">
        <div style="font-size: 1.4em; margin-top: 10px;">⚙️</div>
        <div id="meu-id-txt">ID: ...</div>
    </div>

    <div class="visor" id="visor-container">
        <video id="video-remote" autoplay playsinline style="width:100%; height:100%; object-fit:cover;"></video>
    </div>
</div>

<input type="file" id="my-photo-input" accept="image/*" style="display:none" onchange="previewMinhaFoto(this)">

<div id="screen-login">
    <h1 style="color:var(--primary); margin-bottom: 30px;">NETBASE CLOUD</h1>
    
    <input type="text" id="input-nome" class="input-cloud" placeholder="NOME DO USUÁRIO">
    <input type="number" id="input-id" class="input-cloud" placeholder="DIGITE SEU ID ÚNICO">

    <button class="btn-base btn-outline" onclick="gerarIDProtegido()">CRIAR NOVO ID ÚNICO</button>
    <button class="btn-base btn-primary" onclick="tentarLogin()">ACESSAR CONTA</button>
    
    <p id="msg-erro" style="color:red; font-size:12px; margin-top:15px; text-align:center;"></p>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaJ4WY8pvL7cAgXIZpSkIDk1Oy4rbsb92mgNN", 
        databaseURL: "https://netbase-cloud-default-rtdb.firebaseio.com/" 
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // Gera um "ID de Aparelho" único baseado no navegador para evitar clonagem
    const fingerprintAparelho = navigator.userAgent.replace(/\D/g, "") + screen.width;
    
    let meuID = "", minhaFotoBase64 = "";

    // 1. GERAR ID COM CHECAGEM DE EXISTÊNCIA
    async function gerarIDProtegido() {
        const novoID = Math.floor(100000 + Math.random() * 900000);
        
        // Verifica se esse ID já existe na nuvem
        const snap = await database.ref('usuarios/' + novoID).once('value');
        if(snap.exists()) {
            return gerarIDProtegido(); // Se existir, tenta gerar outro
        }
        
        document.getElementById('input-id').value = novoID;
        alert("ID Gerado e Disponível: " + novoID);
    }

    // 2. TENTAR LOGIN COM TRAVA DE DISPOSITIVO
    async function tentarLogin() {
        meuID = document.getElementById('input-id').value;
        let nome = document.getElementById('input-nome').value;
        const erroTxt = document.getElementById('msg-erro');
        
        if(!meuID || !nome) return alert("Preencha tudo!");

        database.ref('usuarios/' + meuID).once('value', async snap => {
            if(snap.exists()) {
                const dados = snap.val();
                
                // TRAVA DE SEGURANÇA: Verifica se o ID pertence a outro aparelho
                if(dados.hardwareID && dados.hardwareID !== fingerprintAparelho) {
                    erroTxt.innerText = "ERRO: Este ID já está ativo em outro celular!";
                    return;
                }
                
                minhaFotoBase64 = dados.foto || "";
            }

            // Salva vinculando o ID ao aparelho atual
            await database.ref('usuarios/' + meuID).update({
                nome: nome,
                foto: minhaFotoBase64,
                hardwareID: fingerprintAparelho,
                status: "ativo"
            });

            iniciarApp();
        });
    }

    function iniciarApp() {
        const peer = new Peer(meuID);
        peer.on('open', () => {
            document.getElementById('screen-login').style.display = 'none';
            document.getElementById('meu-id-txt').innerText = "ID: " + meuID;
            if(minhaFotoBase64) {
                document.getElementById('my-header-pic').src = minhaFotoBase64;
                document.getElementById('my-header-pic').style.display = 'block';
            }
        });
    }

    function previewMinhaFoto(input) {
        const reader = new FileReader();
        reader.onload = e => {
            minhaFotoBase64 = e.target.result;
            if(meuID) database.ref('usuarios/'+meuID).update({foto: minhaFotoBase64});
        };
        reader.readAsDataURL(input.files[0]);
    }
</script>
</body>
</html>
