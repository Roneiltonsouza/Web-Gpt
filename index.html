<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web GPT Pro - Full Lock</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --led-green: #00ff00; --primary: #800080; --orange: #ffa500; --led-blue: #00fbff; --led-red: #ff0000; }
        * { box-sizing: border-box; touch-action: none; outline: none; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: sans-serif; overflow: hidden; position: fixed; }

        .app-main { display: flex; flex-direction: column; width: 100%; height: 100%; background: linear-gradient(180deg, #1e56a0 0%, #163e75 100%); position: relative; }

        /* CABEÇALHO */
        .notch-container { display: flex; flex-direction: column; align-items: center; z-index: 10000; }
        .notch { 
            width: 210px; height: 45px; 
            background: linear-gradient(90deg, #000 0%, #fff 33%, #ffa500 66%, #800080 100%);
            border-bottom-left-radius: 25px; border-bottom-right-radius: 25px; 
            overflow: hidden; border: 2px solid #333;
            display: flex; align-items: center; justify-content: center;
            gap: 10px; padding: 0 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        
        .led-status { width: 8px; height: 8px; border-radius: 50%; background: var(--led-red); box-shadow: 0 0 5px var(--led-red); }
        .led-active { background: var(--led-green) !important; box-shadow: 0 0 8px var(--led-green) !important; }

        #header-pic-circle { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 2px solid #000; display: none; }
        .label-perfil { color: #000; font-size: 11px; font-weight: bold; text-shadow: 1px 1px 0px rgba(255,255,255,0.5); }

        /* LOGIN */
        #screen-login { position: fixed; inset: 0; background: #000; z-index: 20000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .input-style { width: 80%; padding: 12px; margin-top: 10px; border-radius: 10px; border: 1px solid var(--primary); background: #111; color: white; text-align: center; }
        .btn-main { width: 80%; padding: 15px; margin-top: 30px; background: var(--primary); color: white; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; }
        
        #foto-upload-btn { width: 100px; height: 100px; border-radius: 50%; border: 3px solid #fff; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #222; margin-bottom: 20px; cursor: pointer; }
        #preview-foto-login { width: 100%; height: 100%; object-fit: cover; display: none; }
    </style>
</head>
<body>

<div class="app-main">
    <div class="notch-container">
        <div class="notch">
            <div id="led-ativo" class="led-status"></div>
            <img id="header-pic-circle" src="">
            <span class="label-perfil" id="label-nome-topo">PERFIL</span>
        </div>
    </div>
    <div style="flex:1; position:relative;">
        <video id="video-remote" style="width:100%; height:100%; object-fit:cover;" autoplay playsinline></video>
    </div>
</div>

<div id="screen-login">
    <h2 style="color:var(--primary)">WEB GPT PRO</h2>
    
    <div id="foto-upload-btn" onclick="document.getElementById('file-input').click()">
        <img id="preview-foto-login" src="">
        <span id="txt-add" style="color:white; font-size:12px;">FOTO</span>
    </div>

    <input type="text" id="input-nome" class="input-style" placeholder="SEU NOME">
    <input type="number" id="input-id" class="input-style" placeholder="DIGITE SEU ID" oninput="checarBase(this.value)">
    
    <button class="btn-main" onclick="entrar()">ACESSAR SISTEMA</button>
    <button onclick="gerarNovoID()" style="background:none; border:none; color:var(--led-blue); font-size:11px; margin-top:15px; text-decoration:underline;">GERAR ID ÚNICO</button>
</div>

<input type="file" id="file-input" accept="image/*" style="display:none" onchange="processarFoto(this)">

<script>
    const firebaseConfig = { apiKey: "AIzaJ4WY8pvL7cAgXIZpSkIDk1Oy4rbsb92mgNN", databaseURL: "https://netbase-cloud-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // Fingerprint do dispositivo para a trava no Firebase
    const deviceSignature = navigator.userAgent + screen.width + screen.height;
    let fotoBase64 = "";

    function gerarNovoID() {
        const novoId = Math.floor(100000 + Math.random() * 900000);
        document.getElementById('input-id').value = novoId;
    }

    function processarFoto(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                fotoBase64 = e.target.result;
                const img = document.getElementById('preview-foto-login');
                img.src = fotoBase64;
                img.style.display = 'block';
                document.getElementById('txt-add').style.display = 'none';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    // Busca automática para carregar dados se o ID já existir
    async function checarBase(id) {
        if(id.length < 3) return;
        database.ref('perfis/' + id).once('value', snap => {
            if(snap.exists()){
                const d = snap.val();
                document.getElementById('input-nome').value = d.nome || "";
                if(d.foto) {
                    fotoBase64 = d.foto;
                    const img = document.getElementById('preview-foto-login');
                    img.src = d.foto;
                    img.style.display = 'block';
                    document.getElementById('txt-add').style.display = 'none';
                }
            }
        });
    }

    async function entrar() {
        const id = document.getElementById('input-id').value;
        const nome = document.getElementById('input-nome').value;

        if(!id || !nome) return alert("Por favor, preencha nome, ID e adicione uma foto.");

        const userRef = database.ref('perfis/' + id);
        const snap = await userRef.once('value');

        if(snap.exists()) {
            const dados = snap.val();
            // TRAVA FIREBASE: Se o device_lock existe e é diferente deste aparelho, bloqueia
            if(dados.device_lock && dados.device_lock !== deviceSignature) {
                alert("ACESSO NEGADO: Este ID pertence a outro dispositivo!");
                return;
            }
            // Se o ID existe mas não tinha trava (primeiro acesso após atualização), trava agora
            if(!dados.device_lock) {
                userRef.update({ device_lock: deviceSignature });
            }
        } else {
            // NOVO REGISTRO: Salva tudo e tranca o aparelho no Firebase
            userRef.set({
                nome: nome,
                foto: fotoBase64,
                device_lock: deviceSignature,
                online: true
            });
        }

        // Finaliza o acesso
        document.getElementById('screen-login').style.display = 'none';
        document.getElementById('label-nome-topo').innerText = nome;
        document.getElementById('led-ativo').classList.add('led-active');
        
        if(fotoBase64) {
            const headerImg = document.getElementById('header-pic-circle');
            headerImg.src = fotoBase64;
            headerImg.style.display = 'block';
        }

        const peer = new Peer(id);
        database.ref('perfis/' + id + '/online').onDisconnect().set(false);
    }
</script>
</body>
</html>
