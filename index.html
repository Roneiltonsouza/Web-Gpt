<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web GPT - Excluir com Swipe</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --led-green: #00ff00; --bg: #000; --primary: #800080; --orange: #ffa500; }
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background: #000; color: white; font-family: sans-serif; height: 100vh; width: 100vw; overflow: hidden; }
        
        .app-container { display: flex; flex-direction: column; height: 100%; width: 100%; }
        
        /* LISTA DE CONTATOS */
        .contacts-list { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: none; overflow-y: auto; }
        
        .contact-row { position: relative; width: 100%; overflow: hidden; border-bottom: 1px solid #333; height: 70px; display: flex; align-items: center; }
        .contact-content { position: absolute; width: 100%; height: 100%; background: #000; padding: 20px; color: var(--orange); font-weight: bold; z-index: 2; transition: transform 0.3s; }
        .delete-btn { position: absolute; right: 0; width: 80px; height: 100%; background: red; color: white; display: flex; align-items: center; justify-content: center; z-index: 1; font-size: 0.8em; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <span onclick="toggleAgenda()" style="color:var(--orange); cursor:pointer;">▼ CONTATOS</span>
    </div>

    <div class="visor" id="visor-container">
        <div id="list-contatos" class="contacts-list"></div>
    </div>
</div>

<script>
    const API_KEY = "OngH8WRkvXaOgMmFeZo";
    let contatos = JSON.parse(localStorage.getItem('agenda_' + API_KEY)) || [];

    function renderizarAgenda() {
        const lista = document.getElementById('list-contatos');
        lista.innerHTML = contatos.map((c, index) => `
            <div class="contact-row" id="row-${index}">
                <div class="delete-btn" onclick="excluirContato(${index})">EXCLUIR</div>
                <div class="contact-content" ontouchstart="iniciarSwipe(event, ${index})" ontouchend="finalizarSwipe(event, ${index})" onclick="ligarPara('${c.id}')">
                    📞 ${c.nome}
                </div>
            </div>
        `).join('');
    }

    // Lógica do SWIPE
    let touchStartX = 0;
    function iniciarSwipe(e, index) { touchStartX = e.touches[0].clientX; }
    function finalizarSwipe(e, index) {
        let delta = e.changedTouches[0].clientX - touchStartX;
        const item = document.querySelector(`#row-${index} .contact-content`);
        if (delta < -50) { // Arrastou para esquerda
            item.style.transform = "translateX(-80px)";
        } else if (delta > 50) { // Arrastou para direita (reset)
            item.style.transform = "translateX(0)";
        }
    }

    function excluirContato(index) {
        contatos.splice(index, 1);
        localStorage.setItem('agenda_' + API_KEY, JSON.stringify(contatos));
        renderizarAgenda();
    }

    function toggleAgenda() {
        const div = document.getElementById('list-contatos');
        div.style.display = (div.style.display === 'block') ? 'none' : 'block';
    }

    renderizarAgenda();
</script>
</body>
</html>
