<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web GPT Pro - Firebase Edition</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --led-green: #00ff00; --primary: #800080; --orange: #ffa500; --led-blue: #00fbff; }
        * { box-sizing: border-box; touch-action: none; outline: none; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: sans-serif; overflow: hidden; position: fixed; }

        .app-main { display: flex; flex-direction: column; width: 100%; height: 100%; background: linear-gradient(180deg, #1e56a0 0%, #163e75 100%); position: relative; }

        .notch-container { display: flex; flex-direction: column; align-items: center; z-index: 10000; }
        .notch { 
            width: 210px; height: 45px; 
            background: linear-gradient(90deg, #000 0%, #fff 33%, #ffa500 66%, #800080 100%);
            border-bottom-left-radius: 25px; border-bottom-right-radius: 25px; 
            overflow: hidden; border: 2px solid #333;
            display: flex; align-items: center; justify-content: center; cursor: pointer; gap: 10px; padding: 0 15px;
        }
        #header-pic-circle { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 2px solid #000; }
        .label-perfil { color: #000; font-size: 11px; font-weight: bold; }
        .id-notch { color: #000; font-size: 10px; font-weight: bold; font-family: monospace; }

        .aba-menu { position: absolute; left: 0; top: 130px; background: var(--primary); color: white; padding: 12px 6px; border-radius: 0 12px 12px 0; font-size: 10px; font-weight: bold; writing-mode: vertical-rl; cursor: pointer; z-index: 9500; border: 1px solid var(--led-blue); }

        .visor { flex: 1; position: relative; overflow: hidden; }
        #video-remote { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 1; }
        #video-local { width: 85px; height: 120px; position: absolute; top: 10px; right: 10px; border: 2px solid var(--primary); z-index: 100; display: none; border-radius: 12px; object-fit: cover; }

        .floating-img { position: absolute; width: 100%; height: 100%; top: 0; left: 0; z-index: 50; background: #000; }
        .floating-img img { width: 100%; height: 100%; object-fit: contain; }

        /* Sliders */
        .slider-container { width: 280px; height: 75px; background: #222; border-radius: 40px; position: relative; display: flex; align-items: center; border: 2px solid #444; overflow: hidden; }
        .slider-btn { width: 65px; height: 65px; background: var(--led-green); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; position: absolute; left: 5px; z-index: 2; }
        .slider-btn.hangup { background: #ff0000; }
        .slider-text { width: 100%; text-align: center; color: white; font-size: 11px; font-weight: bold; opacity: 0.6; }

        #hangup-slider-box { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); z-index: 60005; display: none; }
        #incoming-screen { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 60000; display: none; flex-direction: column; align-items: center; justify-content: space-around; }

        #cam-footer-btn { width:50px; height:35px; background:#b30000; border-radius:8px; border:2px solid #500; cursor:pointer; }
        #cam-footer-btn.active { background: var(--led-green); box-shadow: 0 0 10px var(--led-green); }

        #screen-login { position: fixed; inset: 0; background: #000; z-index: 20000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .dropdown-menu { position: absolute; top: 130px; left: 0; background: rgba(0,0,0,0.95); border: 1px solid var(--primary); border-radius: 0 15px 15px 0; width: 200px; display: none; z-index: 11000; }
        #view-perfil-full { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 50000; display: none; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<audio id="ringtone" loop><source src="https://assets.mixkit.co/active_storage/sfx/1358/1358-preview.mp3" type="audio/mpeg"></audio>

<div class="app-main">
    <div class="notch-container">
        <div class="notch" onclick="abrirConfigPerfil()">
            <img id="header-pic-circle" src="">
            <div class="info-notch">
                <span class="label-perfil" id="label-nome-topo">---</span>
                <span class="id-notch" id="label-id-topo">ID: ---</span>
            </div>
        </div>
    </div>

    <div class="aba-menu" onclick="toggleMenu()">MENU</div>

    <div class="visor">
        <div id="img-persistente-container"></div>
        <video id="video-remote" autoplay playsinline></video>
        <video id="video-local" autoplay playsinline muted></video>
        <div id="contatos-na-tela"></div>
        <div id="list-contatos" style="display:none; position:absolute; inset:0; background:rgba(0,0,0,0.98); z-index:15000; padding:20px;">
            <button onclick="document.getElementById('list-contatos').style.display='none'" style="width:100%; padding:15px; background:red; color:white; border:none; border-radius:10px;">VOLTAR</button>
            <div id="contatos-render"></div>
        </div>
    </div>

    <div id="hangup-slider-box">
        <div class="slider-container" id="hangup-track">
            <div class="slider-text">DESLIZE PARA DESLIGAR</div>
            <div id="hangup-handle" class="slider-btn hangup">📵</div>
        </div>
    </div>

    <div style="height:60px; display:flex; justify-content:center; align-items:center; background:rgba(0,0,0,0.5);">
        <div id="cam-footer-btn" onclick="toggleCameraManual()"></div>
    </div>
</div>

<div id="screen-login">
    <h2 style="color:var(--primary)">WEB GPT PRO</h2>
    <input type="text" id="input-nome" placeholder="SEU NOME" style="width:80%; padding:12px; margin:10px; border-radius:10px; background:#111; color:white; text-align:center;">
    <input type="number" id="input-id" placeholder="ID ÚNICO" style="width:80%; padding:12px; margin:10px; border-radius:10px; background:#222; color:var(--led-green); text-align:center;">
    <button onclick="entrar()" style="width:80%; padding:15px; background:var(--primary); color:white; border:none; border-radius:15px; font-weight:bold;">ACESSAR</button>
</div>

<div id="incoming-screen">
    <div style="text-align:center">
        <img id="caller-photo" src="" style="width:120px; height:120px; border-radius:50%; border:3px solid var(--led-green); object-fit:cover;">
        <h2 id="caller-name" style="color:white; margin-top:15px;">Chamada...</h2>
    </div>
    <div class="slider-container" id="slider-track">
        <div class="slider-text">ARRASTE PARA ATENDER</div>
        <div id="slider-handle" class="slider-btn">📞</div>
    </div>
</div>

<div id="view-perfil-full">
    <img id="img-full-edit" src="" style="width:180px; height:180px; border-radius:20px; object-fit:cover;">
    <button class="btn-perfil-opt" style="background:var(--primary); color:white; width:80%; padding:15px; margin-top:10px; border-radius:10px;" onclick="document.getElementById('change-photo-input').click()">MUDAR MINHA FOTO</button>
    <button class="btn-perfil-opt" style="background:var(--orange); width:80%; padding:15px; margin-top:10px; border-radius:10px;" onclick="document.getElementById('gallery-to-screen').click()">ADICIONAR IMAGEM NA TELA</button>
    <button onclick="fecharPerfil()" style="margin-top:20px; color:white; background:none; border:none;">FECHAR</button>
</div>

<div id="menu-dropdown" class="dropdown-menu">
    <div class="dropdown-item" onclick="abrirAgenda()">📂 AGENDA</div>
    <div class="dropdown-item" onclick="novoContatoModal()">👤 NOVO CONTATO</div>
    <div class="dropdown-item" style="color:red" onclick="toggleMenu()">✖ FECHAR</div>
</div>

<input type="file" id="change-photo-input" accept="image/*" style="display:none" onchange="processarFoto(this)">
<input type="file" id="gallery-to-screen" accept="image/*" style="display:none" onchange="salvarImagemPersistente(this)">

<script>
    const firebaseConfig = { apiKey: "AIzaJ4WY8pvL7cAgXIZpSkIDk1Oy4rbsb92mgNN", databaseURL: "https://netbase-cloud-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let peer, localStream, currentCall, meuID = "", meuNome = "", minhaFoto = "";
    const ringtone = document.getElementById('ringtone');

    // Inicialização: Tenta recuperar o último ID usado (facilitação de login)
    window.onload = () => {
        const last = localStorage.getItem('last_id');
        if(last) document.getElementById('input-id').value = last;
    };

    async function entrar() {
        meuID = document.getElementById('input-id').value;
        meuNome = document.getElementById('input-nome').value;
        if(!meuID || !meuNome) return alert("Preencha tudo");

        localStorage.setItem('last_id', meuID);
        
        // Sincronização Inicial com Firebase (Recupera foto e imagem de fundo)
        db.ref('perfis/' + meuID).on('value', snap => {
            const data = snap.val();
            if(data) {
                if(data.foto) {
                    minhaFoto = data.foto;
                    document.getElementById('header-pic-circle').src = data.foto;
                }
                if(data.imgFundo) {
                    renderizarFundo(data.imgFundo);
                }
                document.getElementById('label-nome-topo').innerText = data.nome || meuNome;
            }
        });

        peer = new Peer(meuID);
        peer.on('open', () => {
            document.getElementById('screen-login').style.display = 'none';
            document.getElementById('label-id-topo').innerText = "ID: " + meuID;
            db.ref('perfis/' + meuID).update({ nome: meuNome, online: true });
            sincronizarContatos();
        });

        peer.on('call', call => {
            ringtone.play();
            document.getElementById('incoming-screen').style.display = 'flex';
            db.ref('perfis/' + call.peer).once('value', s => {
                if(s.exists()){
                    document.getElementById('caller-name').innerText = s.val().nome;
                    document.getElementById('caller-photo').src = s.val().foto || "";
                }
            });
            setupSlider('slider-handle', 'slider-track', () => atender(call));
        });
    }

    function setupSlider(handleId, trackId, callback) {
        const handle = document.getElementById(handleId);
        const track = document.getElementById(trackId);
        let isMoving = false;
        handle.style.left = "5px";

        const mover = (e) => {
            if(!isMoving) return;
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let x = clientX - track.getBoundingClientRect().left - 32;
            if(x < 5) x = 5; if(x > 210) x = 210;
            handle.style.left = x + "px";
            if(x >= 205) { isMoving = false; callback(); }
        };

        handle.ontouchstart = handle.onmousedown = () => isMoving = true;
        window.ontouchmove = window.onmousemove = mover;
        window.ontouchend = window.onmouseup = () => { isMoving = false; handle.style.left = "5px"; };
    }

    async function atender(call) {
        pararToque();
        document.getElementById('incoming-screen').style.display = 'none';
        await ativarCamera();
        call.answer(localStream);
        vincularChamada(call);
    }

    function vincularChamada(call) {
        currentCall = call;
        document.getElementById('cam-footer-btn').classList.add('active');
        document.getElementById('hangup-slider-box').style.display = 'block';
        setupSlider('hangup-handle', 'hangup-track', finalizarChamada);
        
        call.on('stream', s => { document.getElementById('video-remote').srcObject = s; });
        call.on('close', finalizarChamada);
    }

    function finalizarChamada() {
        if(currentCall) currentCall.close();
        document.getElementById('hangup-slider-box').style.display = 'none';
        document.getElementById('cam-footer-btn').classList.remove('active');
        document.getElementById('video-remote').srcObject = null;
        pararToque();
    }

    function pararToque() { ringtone.pause(); ringtone.currentTime = 0; }

    // PERSISTÊNCIA FIREBASE: IMAGEM DE FUNDO
    function salvarImagemPersistente(input) {
        const reader = new FileReader();
        reader.onload = e => {
            const base64 = e.target.result;
            db.ref('perfis/' + meuID).update({ imgFundo: base64 });
            fecharPerfil();
        };
        reader.readAsDataURL(input.files[0]);
    }

    function renderizarFundo(src) {
        document.getElementById('img-persistente-container').innerHTML = `<div class="floating-img"><img src="${src}"></div>`;
    }

    async function ativarCamera() {
        try {
            if(!localStream) {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('video-local').srcObject = localStream;
                document.getElementById('video-local').style.display = 'block';
            }
            document.getElementById('cam-footer-btn').classList.add('active');
        } catch(e) { console.error("Erro câmera"); }
    }

    async function toggleCameraManual() {
        if(!localStream) await ativarCamera();
        else {
            localStream.getTracks().forEach(t => t.stop());
            localStream = null;
            document.getElementById('video-local').style.display = 'none';
            document.getElementById('cam-footer-btn').classList.remove('active');
        }
    }

    function processarFoto(input) {
        const reader = new FileReader();
        reader.onload = e => {
            db.ref('perfis/'+meuID).update({ foto: e.target.result });
            document.getElementById('img-full-edit').src = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);
    }

    function sincronizarContatos() {
        db.ref('agenda/' + meuID).on('value', snap => {
            const render = document.getElementById('contatos-render'); render.innerHTML = "";
            snap.forEach(c => {
                const con = c.val();
                render.innerHTML += `<div style="display:flex; align-items:center; justify-content:space-between; padding:12px; border-bottom:1px solid #333; color:white;">
                    <div onclick="fixarNaTela('${con.nome}','${con.id}','${con.foto}')">
                        <img src="${con.foto}" style="width:40px; height:40px; border-radius:50%; vertical-align:middle; margin-right:10px;">
                        <b>${con.nome}</b>
                    </div>
                    <button onclick="excluirContato('${con.id}')" style="background:none; border:none; color:red;">X</button>
                </div>`;
            });
        });
    }

    function fixarNaTela(nome, id, foto) {
        document.getElementById('list-contatos').style.display = 'none';
        const card = document.createElement('div');
        card.className = 'floating-contact';
        card.style.top = "150px"; card.style.left = "30px";
        card.innerHTML = `<img src="${foto}" style="width:50px; height:50px; border-radius:50%; object-fit:cover;"><div style="color:white; font-size:10px;">${nome}</div><button onclick="ligarPara('${id}')" style="background:var(--led-green); border:none; border-radius:5px; padding:3px 8px; font-weight:bold; font-size:9px;">LIGAR</button>`;
        document.getElementById('contatos-na-tela').appendChild(card);
    }

    async function ligarPara(id) { 
        await ativarCamera();
        const call = peer.call(id, localStream); 
        vincularChamada(call);
    }

    function abrirConfigPerfil() { document.getElementById('img-full-edit').src = minhaFoto; document.getElementById('view-perfil-full').style.display = 'flex'; }
    function fecharPerfil() { document.getElementById('view-perfil-full').style.display = 'none'; }
    function toggleMenu() { const m = document.getElementById('menu-dropdown'); m.style.display = (m.style.display === 'block') ? 'none' : 'block'; }
    function abrirAgenda() { document.getElementById('list-contatos').style.display = 'block'; }
    function novoContatoModal() {
        const n = prompt("Nome:"); const i = prompt("ID:");
        if(n && i) db.ref('perfis/'+i).once('value', s => {
            const f = s.exists() ? s.val().foto : "";
            db.ref('agenda/'+meuID+'/'+i).set({id:i, nome:n, foto:f});
        });
    }
    function excluirContato(id) { if(confirm("Excluir?")) db.ref('agenda/'+meuID+'/'+id).remove(); }
</script>
</body>
</html>
