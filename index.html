<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web GPT Oficial</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --led-green: #00ff00; --primary: #800080; --orange: #ffa500; --led-blue: #00fbff; }
        * { box-sizing: border-box; touch-action: none; outline: none; -webkit-tap-highlight-color: transparent; }
        
        html, body { margin: 0; padding: 0; background: #000; color: white; font-family: sans-serif; height: 100vh; width: 100vw; overflow: hidden; }
        .app-container { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        
        /* CABEÇALHO */
        .header { height: 45px; padding: 0 10px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #222; background: #050505; z-index: 3000; }
        
        #led-encerrar { display: none; align-items: center; gap: 8px; cursor: pointer; animation: pulseBlue 1s infinite; }
        .led-circle { width: 10px; height: 10px; background: var(--led-blue); border-radius: 50%; box-shadow: 0 0 10px var(--led-blue); }
        .led-text { color: var(--led-blue); font-size: 0.7em; font-weight: bold; }

        @keyframes pulseBlue { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* TELA DE CHAMADA RECEBIDA (SLIDE) */
        #incoming-call { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 7000; 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
        }
        .caller-info { font-size: 1.5em; color: var(--orange); margin-bottom: 50px; font-weight: bold; }
        
        .slide-container { 
            width: 280px; height: 70px; background: #222; border-radius: 40px; 
            position: relative; display: flex; align-items: center; justify-content: center;
            border: 2px solid #333; overflow: hidden;
        }
        .slide-text { font-size: 0.8em; color: #555; pointer-events: none; }
        .slide-btn { 
            width: 60px; height: 60px; background: red; border-radius: 50%; 
            position: absolute; left: 5px; cursor: pointer; display: flex; 
            align-items: center; justify-content: center; font-weight: bold;
            box-shadow: 0 0 15px rgba(255,0,0,0.5); z-index: 10;
        }

        /* VISOR E CÂMERA */
        .visor { flex: 1; position: relative; background-size: cover; background-position: center; overflow: hidden; }
        #video-remote { width: 100%; height: 100%; object-fit: cover; }
        #video-local { width: 85px; height: 115px; position: absolute; top: 15px; right: 15px; border: 1px solid var(--primary); z-index: 10; display: none; border-radius: 10px; }

        .actions-bar { height: 50px; display: flex; justify-content: space-around; align-items: center; background: #0a0a0a; border-top: 1px solid #222; }
        #screen-login { position: fixed; inset: 0; background: #000; z-index: 8000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body>

<audio id="ringtone" loop src="https://assets.mixkit.co/active_storage/sfx/1358/1358-preview.mp3"></audio>

<div id="screen-login">
    <h1 style="color:var(--primary)">WEB GPT</h1>
    <div id="led-btn" style="width:60px; height:60px; border-radius:50%; border:3px solid #fff; background:#333;" onclick="gerarIDUnico()"></div>
    <input type="number" id="input-id" style="width: 70%; padding: 15px; margin: 20px 0; background: #111; color: white; border: 1px solid var(--primary); text-align: center; border-radius: 10px;" placeholder="SEU ID">
    <button onclick="entrarNoSistema()" style="padding: 15px 40px; background:var(--primary); color:white; border:none; border-radius:10px;">ENTRAR</button>
</div>

<div id="incoming-call">
    <div class="caller-info" id="caller-name">CARREGANDO...</div>
    <div class="slide-container" id="slide-area">
        <span class="slide-text">◄ RECUSAR | ATENDER ►</span>
        <div class="slide-btn" id="slider">📞</div>
    </div>
</div>

<div class="app-container">
    <div class="header">
        <div onclick="toggleMenu()" style="cursor:pointer; width:30px;">📱</div>
        <div id="led-encerrar" onclick="encerrarChamada()">
            <div class="led-circle"></div>
            <span class="led-text">ENCERRAR LIGAÇÃO</span>
        </div>
        <div style="color:var(--primary); font-weight:bold;">WEB GPT</div>
        <div id="meu-id-txt" style="color:var(--led-green); font-size: 0.7em; font-weight:bold;">ID: ...</div>
    </div>

    <div class="visor" id="visor-container">
        <div id="list-contatos" style="position:absolute; inset:0; background:rgba(0,0,0,0.9); z-index:2500; display:none; padding:20px; touch-action: pan-y;"></div>
        <div id="contatos-na-tela"></div>
        <video id="video-remote" autoplay playsinline></video>
        <video id="video-local" autoplay playsinline muted></video>
    </div>

    <div class="actions-bar">
        <div onclick="document.getElementById('img-input').click()" style="font-size: 1.5em; cursor:pointer;">🖼️</div>
        <input type="file" id="img-input" accept="image/*" style="display:none" onchange="trocarFundo(this)">
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaJ4WY8pvL7cAgXIZpSkIDk1Oy4rbsb92mgNN", databaseURL: "https://netbase-cloud-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let peer, localStream, currentCall, meuID = "";

    window.onload = () => {
        const idSalvo = localStorage.getItem('webgpt_id');
        if (idSalvo) document.getElementById('input-id').value = idSalvo;
        const img = localStorage.getItem('webgpt_bg_img');
        if (img) document.getElementById('visor-container').style.backgroundImage = `url('${img}')`;
        initSlider();
    };

    function initSlider() {
        const slider = document.getElementById('slider');
        const area = document.getElementById('slide-area');
        let startX = 0, currentX = 0;

        slider.onpointerdown = e => { startX = e.clientX; slider.setPointerCapture(e.pointerId); };
        slider.onpointermove = e => {
            if (startX === 0) return;
            currentX = e.clientX - startX;
            
            // Limites do slider
            if (currentX < -100) currentX = -100; // Recusar
            if (currentX > 210) currentX = 210; // Atender

            slider.style.transform = `translateX(${currentX}px)`;

            // Efeito visual: fica verde se for para a direita
            if (currentX > 0) {
                let ratio = currentX / 210;
                slider.style.background = `rgb(${255 - (255 * ratio)}, ${255 * ratio}, 0)`;
            } else {
                slider.style.background = 'red';
            }
        };

        slider.onpointerup = () => {
            if (currentX >= 180) { // ATENDER
                atenderChamada();
            } else if (currentX <= -80) { // RECUSAR
                recusarChamada();
            }
            // Reseta posição
            startX = 0; currentX = 0;
            slider.style.transform = 'translateX(0)';
            slider.style.background = 'red';
        };
    }

    async function entrarNoSistema() {
        meuID = document.getElementById('input-id').value;
        if (!meuID) return;
        localStorage.setItem('webgpt_id', meuID);
        peer = new Peer(meuID);
        peer.on('open', () => {
            document.getElementById('screen-login').style.display = 'none';
            document.getElementById('meu-id-txt').innerText = "ID: " + meuID;
            ativarCamera();
        });
        peer.on('call', call => {
            currentCall = call;
            document.getElementById('caller-name').innerText = "CHAMADA DE: " + call.peer;
            document.getElementById('incoming-call').style.display = 'flex';
            document.getElementById('ringtone').play();
        });
    }

    async function ativarCamera() {
        if(!localStream) localStream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
        document.getElementById('video-local').srcObject = localStream;
        document.getElementById('video-local').style.display = 'block';
    }

    async function atenderChamada() {
        document.getElementById('ringtone').pause();
        document.getElementById('incoming-call').style.display = 'none';
        document.getElementById('led-encerrar').style.display = 'flex';
        await ativarCamera();
        currentCall.answer(localStream);
        currentCall.on('stream', s => document.getElementById('video-remote').srcObject = s);
    }

    function recusarChamada() {
        if(currentCall) currentCall.close();
        document.getElementById('incoming-call').style.display = 'none';
        document.getElementById('ringtone').pause();
    }

    function encerrarChamada() {
        if(currentCall) currentCall.close();
        document.getElementById('led-encerrar').style.display = 'none';
        document.getElementById('video-remote').srcObject = null;
    }

    function gerarIDUnico() {
        const id = Math.floor(100000 + Math.random() * 800000).toString();
        document.getElementById('input-id').value = id;
    }

    function trocarFundo(input) {
        const r = new FileReader();
        r.onload = e => {
            document.getElementById('visor-container').style.backgroundImage = `url('${e.target.result}')`;
            localStorage.setItem('webgpt_bg_img', e.target.result);
        };
        r.readAsDataURL(input.files[0]);
    }
</script>
</body>
</html>
