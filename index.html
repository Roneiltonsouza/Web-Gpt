<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web GPT - Sistema Oficial</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --led-green: #00ff00; --bg: #000; --primary: #800080; --orange: #ffa500; }
        body { margin: 0; padding: 0; background: #000; color: white; font-family: sans-serif; height: 100vh; overflow: hidden; }
        
        .app-container { display: flex; flex-direction: column; height: 100vh; width: 100%; }

        /* TELA DE LOGIN/CADASTRO */
        #screen-login { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .led-trigger { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #fff; background: #333; cursor: pointer; margin-bottom: 10px; }
        .led-active { background: var(--led-green) !important; box-shadow: 0 0 15px var(--led-green); }
        .input-auth { width: 70%; padding: 12px; background: #111; color: white; border: 1px solid #333; border-radius: 8px; text-align: center; font-size: 1.1em; margin-bottom: 15px; }

        /* CABEÇALHO E AÇÕES (BEM FINOS) */
        .header { height: 35px; padding: 0 12px; background: #000; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #222; flex-shrink: 0; font-size: 0.8em; }
        .actions-bar { height: 45px; background: #000; display: flex; justify-content: space-around; align-items: center; border-bottom: 1px solid #222; flex-shrink: 0; }
        
        /* VISOR DE VÍDEO (MÁXIMO ESPAÇO) */
        .visor { flex: 1; position: relative; background: #000; overflow: hidden; }
        #video-remote { width: 100%; height: 100%; object-fit: cover; }
        #video-local { width: 85px; height: 115px; position: absolute; bottom: 10px; right: 10px; border: 1px solid white; border-radius: 8px; z-index: 10; display: none; background: #111; }

        /* BOTÕES E ICONES */
        .btn-call { width: 35px; height: 35px; background: red; border-radius: 50%; cursor: pointer; border: 1px solid white; }
        .btn-icon { font-size: 22px; cursor: pointer; color: var(--orange); }

        /* AGENDA DE CONTATOS */
        .contacts-list { position: absolute; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 100; display: none; overflow-y: auto; }
        .contact-item { padding: 18px; border-bottom: 1px solid #333; color: var(--orange); font-weight: bold; font-size: 1.1em; cursor: pointer; }
    </style>
</head>
<body>

<div id="screen-login">
    <h1 style="color:var(--primary); margin-bottom: 20px;">WEB GPT</h1>
    <div class="led-trigger" id="led-btn" onclick="gerarIDUnico()"></div>
    <p style="font-size: 0.8em; color: #888; margin-bottom: 20px;">CLIQUE NO LED PARA ATIVAR ID</p>
    <input type="number" id="input-id" class="input-auth" placeholder="ID GERADO">
    <button onclick="entrarNoSistema()" style="padding: 12px 40px; background:var(--primary); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">ENTRAR NO SISTEMA</button>
</div>

<div class="app-container">
    <div class="header">
        <b id="meu-id-txt">MEU ID: ...</b>
        <span onclick="toggleAgenda()" style="color:var(--orange); cursor:pointer; font-weight:bold;">▼ CONTATOS</span>
    </div>

    <div class="actions-bar">
        <div class="btn-call" onclick="fazerChamadaLivre()"></div>
        <div class="btn-icon" onclick="salvarContato()">▲</div>
        <div class="btn-icon" onclick="document.getElementById('img-input').click()">🖼️</div>
        <input type="file" id="img-input" style="display:none" onchange="trocarFundo(event)">
    </div>

    <div class="visor" id="visor-bg">
        <div id="list-contatos" class="contacts-list"></div>
        <video id="video-remote" autoplay playsinline></video>
        <video id="video-local" autoplay playsinline muted></video>
    </div>
</div>

<script>
    let peer, localStream;
    let contatos = JSON.parse(localStorage.getItem('agenda_webgpt')) || [];

    // Função do LED: Gera o ID e salva no navegador
    function gerarIDUnico() {
        const novoID = Math.floor(100000 + Math.random() * 800000);
        document.getElementById('input-id').value = novoID;
        document.getElementById('led-btn').classList.add('led-active');
        localStorage.setItem('meu_id_logado', novoID);
    }

    // Entrar: Inicia Câmera e PeerJS
    async function entrarNoSistema() {
        const id = document.getElementById('input-id').value;
        if(!id) return alert("Clique no LED primeiro!");

        try {
            localStream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
            document.getElementById('video-local').srcObject = localStream;
            document.getElementById('video-local').style.display = 'block';

            peer = new Peer(id);
            document.getElementById('meu-id-txt').innerText = "MEU ID: " + id;
            document.getElementById('screen-login').style.display = 'none';

            // Escutar chamadas recebidas
            peer.on('call', call => {
                call.answer(localStream);
                call.on('stream', s => document.getElementById('video-remote').srcObject = s);
            });

            renderizarAgenda();
        } catch(e) {
            alert("Erro: Permita o acesso à câmera!");
        }
    }

    // Chamada Automática ao clicar no contato
    function ligarPara(idAmigo) {
        toggleAgenda(); // Fecha a lista
        const call = peer.call(idAmigo, localStream);
        call.on('stream', s => {
            document.getElementById('video-remote').srcObject = s;
        });
    }

    // Salvar novo amigo na agenda
    function salvarContato() {
        const nome = prompt("Nome do Amigo:");
        const id = prompt("ID do Amigo:");
        if(nome && id) {
            contatos.push({nome, id});
            localStorage.setItem('agenda_webgpt', JSON.stringify(contatos));
            renderizarAgenda();
            alert("Contato Salvo!");
        }
    }

    function renderizarAgenda() {
        const lista = document.getElementById('list-contatos');
        lista.innerHTML = contatos.map(c => `
            <div class="contact-item" onclick="ligarPara('${c.id}')">
                📞 LIGAR PARA: ${c.nome}
            </div>
        `).join('');
    }

    function toggleAgenda() {
        const div = document.getElementById('list-contatos');
        div.style.display = (div.style.display === 'block') ? 'none' : 'block';
    }

    function fazerChamadaLivre() {
        const id = prompt("Digite o ID para ligar:");
        if(id) ligarPara(id);
    }

    function trocarFundo(e) {
        const reader = new FileReader();
        reader.onload = ev => {
            document.getElementById('visor-bg').style.backgroundImage = `url('${ev.target.result}')`;
            document.getElementById('visor-bg').style.backgroundSize = 'cover';
        };
        reader.readAsDataURL(e.target.files[0]);
    }

    // Auto-login se já tiver ID salvo
    window.onload = () => {
        const salvo = localStorage.getItem('meu_id_logado');
        if(salvo) {
            document.getElementById('input-id').value = salvo;
            document.getElementById('led-btn').classList.add('led-active');
        }
    }
</script>
</body>
</html>
