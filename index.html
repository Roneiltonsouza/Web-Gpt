<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web GPT Pro - Perfil Original</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --led-green: #00ff00; --primary: #800080; --orange: #ffa500; --led-blue: #00fbff; }
        * { box-sizing: border-box; touch-action: none; outline: none; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: sans-serif; overflow: hidden; position: fixed; }

        .app-main { display: flex; flex-direction: column; width: 100%; height: 100%; background: linear-gradient(180deg, #1e56a0 0%, #163e75 100%); position: relative; }

        /* NOTCH COM OPÇÕES DE PERFIL */
        .notch { 
            width: 220px; height: 42px; background: #000; 
            border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; 
            margin: 0 auto; z-index: 10000; overflow: hidden; border: 1px solid #333;
            display: flex; align-items: center; justify-content: space-between; padding: 0 12px;
        }
        .notch span { color: white; font-size: 13px; font-weight: bold; }
        #my-header-pic { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; border: 1px solid var(--led-blue); cursor: pointer; }

        .header { height: 45px; padding: 0 15px; display: flex; align-items: flex-start; justify-content: space-between; position: absolute; top: 5px; width: 100%; z-index: 9000; }
        #meu-id-txt { color: var(--led-green); font-weight: bold; font-size: 0.75em; text-shadow: 0 0 5px #000; }
        .btn-engrenagem { font-size: 1.4em; text-shadow: 0 0 5px #000; cursor: pointer; }

        .stories-bar { 
            height: 90px; width: 100%; display: flex; justify-content: center; gap: 12px; 
            overflow-x: auto; padding: 10px; padding-top: 50px;
            background: rgba(0,0,0,0.2); scrollbar-width: none; z-index: 8000;
        }
        .story-circle { min-width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--led-blue); padding: 2px; flex-shrink: 0; }
        .story-circle img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        .visor { flex: 1; position: relative; overflow: hidden; background-size: cover; background-position: center; }
        
        /* VISUALIZADOR FOTO ORIGINAL */
        #full-photo-view { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 50000; display: none; align-items: center; justify-content: center; }
        #full-photo-view img { max-width: 90%; max-height: 80%; border: 2px solid white; border-radius: 10px; }

        #screen-login { position: fixed; inset: 0; background: #000; z-index: 20000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .dropdown-menu { position: absolute; top: 50px; left: 10px; background: rgba(0,0,0,0.95); border: 1px solid var(--primary); border-radius: 15px; width: 220px; display: none; z-index: 11000; }
        .dropdown-item { padding: 15px; border-bottom: 1px solid #222; color: var(--orange); font-size: 0.9em; font-weight: bold; }
        
        .floating-contact { position: absolute; width: 120px; background: rgba(0,0,0,0.8); border-radius: 15px; padding: 10px; text-align: center; border: 1px solid var(--primary); z-index: 100; }
    </style>
</head>
<body>

<div class="app-main">
    <div class="notch">
        <img id="my-header-pic" src="" onclick="verFotoOriginal()" style="display:none">
        <span>Perfil</span>
        <div onclick="document.getElementById('my-photo-input').click()" style="color:white; font-size:18px; cursor:pointer;">📷</div>
    </div>

    <div class="header">
        <div class="btn-engrenagem" onclick="toggleMenu()">⚙️</div>
        <div id="led-encerrar" style="display:none; color:var(--led-blue); font-weight:bold;" onclick="encerrarChamada()">ENCERRAR</div>
        <div id="meu-id-txt">ID: ...</div>
    </div>

    <div class="stories-bar" id="stories-container">
        <div class="story-circle" style="border-style: dashed; display:flex; align-items:center; justify-content:center; color:white;" onclick="document.getElementById('story-input').click()">+</div>
    </div>

    <div class="visor" id="visor-container">
        <div id="list-contatos" style="display:none; position:absolute; inset:0; background:rgba(0,0,0,0.9); z-index:15000; padding:20px; overflow-y: auto;">
             <button onclick="document.getElementById('list-contatos').style.display='none'" style="width:100%; padding:10px; background:red; color:white; border:none; border-radius:10px; margin-bottom:15px; font-weight:bold;">FECHAR AGENDA</button>
             <div id="contatos-render"></div>
        </div>
        <div id="contatos-na-tela"></div>
        <video id="video-remote" autoplay playsinline style="width:100%; height:100%; object-fit:cover;"></video>
        <video id="video-local" autoplay playsinline muted style="width:80px; height:110px; position:absolute; top:10px; right:10px; border-radius:10px; border:2px solid var(--primary); display:none;"></video>
    </div>

    <div class="camera-footer" style="height:60px; display:flex; justify-content:center; align-items:center; background:rgba(0,0,0,0.5);">
        <div style="width:50px; height:35px; background:#b30000; border-radius:8px; border:2px solid #500;" onclick="abrirAgenda()"></div>
    </div>
</div>

<div id="full-photo-view" onclick="this.style.display='none'">
    <img id="img-full" src="">
</div>

<input type="file" id="my-photo-input" accept="image/*" style="display:none" onchange="salvarFotoPerfil(this)">
<input type="file" id="story-input" accept="image/*,video/*" style="display:none" onchange="uploadStory(this)">

<div id="screen-login">
    <h2 style="color:var(--primary)">WEB GPT PRO</h2>
    <input type="text" id="input-nome" placeholder="SEU NOME" style="width:80%; padding:12px; margin-top:20px; border-radius:10px; border:1px solid var(--primary); background:#111; color:white; text-align:center;">
    <input type="number" id="input-id" placeholder="DIGITE SEU ID" style="width:80%; padding:12px; margin-top:10px; border-radius:10px; border:none; background:#222; color:var(--led-green); text-align:center; font-weight:bold;">
    <button onclick="entrar()" style="width:80%; padding:15px; margin-top:30px; background:var(--primary); color:white; border:none; border-radius:15px; font-weight:bold;">ACESSAR</button>
</div>

<div id="menu-dropdown" class="dropdown-menu">
    <div class="dropdown-item" onclick="abrirAgenda()">📂 CONTATOS</div>
    <div class="dropdown-item" onclick="novoContato()">👤 ADICIONAR AMIGO</div>
    <div class="dropdown-item" style="color:red" onclick="toggleMenu()">✖ FECHAR</div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaJ4WY8pvL7cAgXIZpSkIDk1Oy4rbsb92mgNN", databaseURL: "https://netbase-cloud-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    
    const hardwareID = navigator.userAgent.replace(/\D/g, "") + screen.width;
    let meuID = "", minhaFoto = "";

    function verFotoOriginal() {
        if(!minhaFoto) return;
        document.getElementById('img-full').src = minhaFoto;
        document.getElementById('full-photo-view').style.display = 'flex';
    }

    function salvarFotoPerfil(input) {
        const reader = new FileReader();
        reader.onload = e => {
            minhaFoto = e.target.result;
            document.getElementById('my-header-pic').src = minhaFoto;
            document.getElementById('my-header-pic').style.display = 'block';
            if(meuID) database.ref('perfis/'+meuID).update({ foto: minhaFoto });
        };
        reader.readAsDataURL(input.files[0]);
    }

    async function entrar() {
        meuID = document.getElementById('input-id').value;
        let nome = document.getElementById('input-nome').value;
        if(!meuID || !nome) return alert("Preencha os campos!");

        const snap = await database.ref('perfis/'+meuID).once('value');
        if(snap.exists() && snap.val().hw && snap.val().hw !== hardwareID) return alert("ID em outro dispositivo!");

        if(snap.exists() && snap.val().foto) {
            minhaFoto = snap.val().foto;
            document.getElementById('my-header-pic').src = minhaFoto;
            document.getElementById('my-header-pic').style.display = 'block';
        }

        database.ref('perfis/'+meuID).update({ nome, hw: hardwareID });
        document.getElementById('screen-login').style.display = 'none';
        document.getElementById('meu-id-txt').innerText = "ID: " + meuID;
        sincronizarContatos();
    }

    function abrirAgenda() { document.getElementById('list-contatos').style.display = 'block'; }
    function toggleMenu() { const m = document.getElementById('menu-dropdown'); m.style.display = (m.style.display === 'block') ? 'none' : 'block'; }

    function novoContato() {
        const idAmigo = prompt("ID do amigo:");
        if(!idAmigo) return;
        database.ref('perfis/' + idAmigo).once('value', snap => {
            if(snap.exists()){
                database.ref('agenda/' + meuID + '/' + idAmigo).set({ id: idAmigo, nome: snap.val().nome, foto: snap.val().foto || "" });
                alert("Adicionado!");
            }
        });
        toggleMenu();
    }

    function sincronizarContatos() {
        database.ref('agenda/' + meuID).on('value', snap => {
            const render = document.getElementById('contatos-render');
            render.innerHTML = "";
            snap.forEach(c => {
                const con = c.val();
                render.innerHTML += `<div style="display:flex; align-items:center; gap:10px; padding:12px; border-bottom:1px solid #222;" onclick="fixarNaTela('${con.nome}','${con.id}','${con.foto}')">
                    <img src="${con.foto}" style="width:40px; height:40px; border-radius:50%; object-fit:cover;">
                    <div style="color:white; font-weight:bold;">${con.nome}</div></div>`;
            });
        });
    }

    function fixarNaTela(nome, id, foto) {
        document.getElementById('list-contatos').style.display = 'none';
        const card = document.createElement('div');
        card.className = 'floating-contact';
        card.style.top = "150px"; card.style.left = "20px";
        card.innerHTML = `<img src="${foto}" style="width:50px; height:50px; border-radius:50%; object-fit:cover;"><div style="color:white; font-size:10px; margin:5px 0;">${nome}</div><button onclick="this.parentElement.remove()" style="background:none; border:none; color:red; font-size:10px;">REMOVER</button>`;
        document.getElementById('contatos-na-tela').appendChild(card);
    }
</script>
</body>
</html>
