<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web GPT Oficial</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --led-green: #00ff00; --bg: #000; --primary: #800080; --orange: #ffa500; }
        * { box-sizing: border-box; touch-action: pan-y; outline: none; }
        body { margin: 0; padding: 0; background: #000; color: white; font-family: sans-serif; height: 100vh; width: 100vw; overflow: hidden; }
        
        .app-container { display: flex; flex-direction: column; height: 100%; width: 100%; }
        #screen-login { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        .header { height: 45px; padding: 0 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #333; background: rgba(5, 5, 5, 0.9); z-index: 100; }
        .actions-bar { height: 50px; display: flex; justify-content: space-around; align-items: center; border-bottom: 1px solid #333; background: rgba(10, 10, 10, 0.9); z-index: 100; }
        
        /* VISOR COM FUNDO CORRIGIDO */
        .visor { flex: 1; position: relative; background-color: #000; background-size: cover; background-position: center; background-repeat: no-repeat; overflow: hidden; }
        
        #video-remote { width: 100%; height: 100%; object-fit: cover; background: transparent; }
        #video-local { width: 90px; height: 125px; position: absolute; bottom: 15px; right: 15px; border: 2px solid var(--primary); z-index: 10; display: none; background: #222; border-radius: 8px; }

        .contacts-list { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; display: none; overflow-y: auto; }
        .contact-item { padding: 25px; border-bottom: 1px solid #222; color: var(--orange); font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }

        #incoming-call { position: fixed; top: 15%; left: 5%; width: 90%; background: #111; border: 2px solid var(--primary); border-radius: 20px; padding: 25px; z-index: 6000; display: none; text-align: center; box-shadow: 0 0 20px var(--primary); }
        #btn-hangup { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: #ff0000; color: white; border: none; padding: 18px 40px; border-radius: 40px; font-weight: bold; z-index: 3000; display: none; border: 2px solid #fff; }
        
        .btn-accept { background: #00ff00; color: #000; padding: 15px; border: none; border-radius: 12px; font-weight: bold; margin: 10px; width: 110px; }
        .btn-reject { background: #ff0000; color: #fff; padding: 15px; border: none; border-radius: 12px; font-weight: bold; margin: 10px; width: 110px; }
    </style>
</head>
<body>

<audio id="ringtone" loop src="https://assets.mixkit.co/active_storage/sfx/1358/1358-preview.mp3"></audio>

<div id="screen-login">
    <h1 style="color:var(--primary); letter-spacing: 3px;">WEB GPT</h1>
    <div id="led-btn" style="width:60px; height:60px; border-radius:50%; border:3px solid #fff; background:#333; cursor:pointer;" onclick="gerarIDUnico()"></div>
    <p style="font-size: 0.8em; margin: 15px 0; color: #aaa;">GERAR / ATIVAR</p>
    <input type="number" id="input-id" style="width: 75%; padding: 18px; margin: 10px 0; background: #111; color: white; border: 1px solid var(--primary); text-align: center; border-radius: 15px;" placeholder="SEU ID">
    <button onclick="entrarNoSistema()" style="padding: 15px 50px; background:var(--primary); color:white; border:none; border-radius:12px; font-weight: bold;">ENTRAR</button>
</div>

<div id="incoming-call">
    <h2 style="color:var(--orange)">CHAMADA RECEBIDA</h2>
    <p id="caller-id"></p>
    <button class="btn-accept" onclick="atenderChamada()">ATENDER</button>
    <button class="btn-reject" onclick="recusarChamada()">RECUSAR</button>
</div>

<button id="btn-hangup" onclick="encerrarChamada()">ENCERRAR</button>

<div class="app-container">
    <div class="header">
        <b id="meu-id-txt" style="color:var(--led-green)">ID: ...</b>
        <span onclick="toggleAgenda()" style="color:var(--orange); font-weight: bold;">▼ CONTATOS</span>
    </div>

    <div class="actions-bar">
        <div style="width:35px; height:35px; background:red; border-radius:50%; border: 2px solid #fff;" onclick="fazerChamadaDireta()"></div>
        <div style="color:var(--orange); font-weight: bold;" onclick="salvarNovoContato()">ADICIONAR ID</div>
        <div onclick="document.getElementById('img-input').click()" style="font-size: 1.5em; cursor: pointer;">🖼️</div>
        <input type="file" id="img-input" accept="image/*" style="display:none" onchange="trocarFundo(this)">
    </div>

    <div class="visor" id="visor-container">
        <div id="list-contatos" class="contacts-list"></div>
        <video id="video-remote" autoplay playsinline></video>
        <video id="video-local" autoplay playsinline muted></video>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaJ4WY8pvL7cAgXIZpSkIDk1Oy4rbsb92mgNN",
        databaseURL: "https://netbase-cloud-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let peer, localStream, currentCall, vibraInterval;
    let meuID = "";
    let contatos = [];
    const ringtone = document.getElementById('ringtone');

    window.onload = () => {
        const idSalvo = localStorage.getItem('webgpt_id');
        if (idSalvo) {
            document.getElementById('input-id').value = idSalvo;
            document.getElementById('led-btn').style.background = 'var(--led-green)';
        }
        
        // CARREGAR IMAGEM SALVA IMEDIATAMENTE
        const imagemSalva = localStorage.getItem('webgpt_bg_img');
        if (imagemSalva) {
            document.getElementById('visor-container').style.backgroundImage = `url('${imagemSalva}')`;
        }
    };

    function trocarFundo(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const base64Image = e.target.result;
                // Aplica a imagem na tela
                document.getElementById('visor-container').style.backgroundImage = `url('${base64Image}')`;
                // Salva permanentemente no navegador
                try {
                    localStorage.setItem('webgpt_bg_img', base64Image);
                } catch (error) {
                    alert("Imagem muito grande! Tente uma foto mais leve.");
                }
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function gerarIDUnico() {
        const novoID = Math.floor(100000 + Math.random() * 800000).toString();
        document.getElementById('input-id').value = novoID;
        document.getElementById('led-btn').style.background = 'var(--led-green)';
        database.ref('usuarios/' + novoID).update({ status: "ativo" });
    }

    async function entrarNoSistema() {
        meuID = document.getElementById('input-id').value;
        if (!meuID) return alert("GERAR ID PRIMEIRO");
        
        localStorage.setItem('webgpt_id', meuID);
        peer = new Peer(meuID);
        
        peer.on('open', async () => {
            document.getElementById('meu-id-txt').innerText = "ID: " + meuID;
            document.getElementById('screen-login').style.display = 'none';
            sincronizarContatos();
            await ativarCamera();
        });

        peer.on('call', call => {
            currentCall = call;
            document.getElementById('incoming-call').style.display = 'block';
            document.getElementById('caller-id').innerText = "De: " + call.peer;
            ringtone.play().catch(()=>{});
            if ("vibrate" in navigator) vibraInterval = setInterval(() => navigator.vibrate([500, 300]), 1000);
        });
    }

    function sincronizarContatos() {
        database.ref('contatos/' + meuID).on('value', snapshot => {
            const data = snapshot.val();
            contatos = data ? Object.values(data) : [];
            renderizarAgenda();
        });
    }

    function renderizarAgenda() {
        const lista = document.getElementById('list-contatos');
        lista.innerHTML = contatos.map((c) => `
            <div class="contact-item" onclick="ligarPara('${c.id}')">
                <span>👤 ${c.nome}</span>
                <span style="color:var(--led-green)">LIGAR 🎥</span>
            </div>
        `).join('');
    }

    function salvarNovoContato() {
        const nome = prompt("Nome do Amigo:");
        const id = prompt("ID do Amigo:");
        if(nome && id) database.ref('contatos/' + meuID + '/' + id).set({ nome, id });
    }

    async function ativarCamera() {
        try {
            if (!localStream) {
                localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
                document.getElementById('video-local').srcObject = localStream;
                document.getElementById('video-local').style.display = 'block';
            }
        } catch (e) { console.log("Câmera bloqueada ou não encontrada."); }
    }

    async function ligarPara(idAmigo) {
        document.getElementById('list-contatos').style.display = 'none';
        await ativarCamera();
        currentCall = peer.call(idAmigo, localStream);
        vincularStream(currentCall);
    }

    function vincularStream(call) {
        document.getElementById('btn-hangup').style.display = 'block';
        call.on('stream', s => document.getElementById('video-remote').srcObject = s);
        call.on('close', () => encerrarChamada());
    }

    async function atenderChamada() {
        pararNotificacoes();
        await ativarCamera();
        currentCall.answer(localStream);
        vincularStream(currentCall);
    }

    function encerrarChamada() {
        if(currentCall) currentCall.close();
        pararNotificacoes();
        document.getElementById('btn-hangup').style.display = 'none';
        document.getElementById('video-remote').srcObject = null;
    }

    function pararNotificacoes() {
        ringtone.pause(); ringtone.currentTime = 0;
        clearInterval(vibraInterval);
        document.getElementById('incoming-call').style.display = 'none';
    }

    function recusarChamada() { if(currentCall) currentCall.close(); pararNotificacoes(); }
    function toggleAgenda() {
        const div = document.getElementById('list-contatos');
        div.style.display = (div.style.display === 'block') ? 'none' : 'block';
    }
    function fazerChamadaDireta() {
        const id = prompt("Digite o ID para ligar:");
        if(id) ligarPara(id);
    }
</script>
</body>
</html>
