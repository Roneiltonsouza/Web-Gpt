<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web GPT Pro - Video Call Focus</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --led-green: #00ff00; --primary: #800080; --orange: #ffa500; --led-blue: #00fbff; }
        * { box-sizing: border-box; touch-action: none; outline: none; -webkit-tap-highlight-color: transparent; }
        
        /* A TELA TODA É O VÍDEO */
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: sans-serif; overflow: hidden; position: fixed; }

        .app-main { 
            display: flex; flex-direction: column; width: 100%; height: 100%; 
            position: relative; overflow: hidden;
            background: #001a33; /* Fundo azul escuro de espera */
        }

        /* VÍDEO REMOTO (A PESSOA) - OCUPA TUDO */
        #video-remote { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            object-fit: cover; z-index: 1; 
        }

        /* VÍDEO LOCAL (EU) - FLUTUANTE */
        #video-local { 
            width: 90px; height: 130px; position: absolute; top: 70px; right: 15px; 
            border: 2px solid var(--led-blue); z-index: 1000; border-radius: 15px; 
            object-fit: cover; background: #000; display: none;
            box-shadow: 0 0 15px rgba(0, 251, 255, 0.4);
        }

        /* CABEÇALHO DEGRADÊ SOBRE O VÍDEO */
        .notch-container { position: absolute; top: 0; left: 50%; transform: translateX(-50%); z-index: 10000; }
        .notch { 
            width: 220px; height: 48px; 
            background: linear-gradient(90deg, #000 0%, #fff 33%, #ffa500 66%, #800080 100%);
            border-bottom-left-radius: 25px; border-bottom-right-radius: 25px; 
            display: flex; align-items: center; justify-content: center; 
            gap: 10px; padding: 0 15px; border: 1px solid rgba(255,255,255,0.2);
        }
        #header-pic-circle { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; border: 2px solid #000; }
        .label-perfil { color: #000; font-size: 11px; font-weight: bold; }
        .id-notch { color: #000; font-size: 10px; font-weight: bold; }

        /* MENU LATERAL */
        .aba-menu {
            position: absolute; left: 0; top: 150px; background: rgba(128, 0, 128, 0.8);
            color: white; padding: 15px 7px; border-radius: 0 15px 15px 0;
            font-size: 11px; font-weight: bold; writing-mode: vertical-rl;
            cursor: pointer; z-index: 9500; border: 1px solid var(--led-blue);
            backdrop-filter: blur(5px);
        }

        /* CONTATOS FLUTUANTES */
        .floating-contact, .floating-img { 
            position: absolute; width: 115px; background: rgba(0,0,0,0.6); 
            backdrop-filter: blur(8px); border-radius: 18px; padding: 10px; 
            text-align: center; border: 1px solid rgba(255,255,255,0.3); 
            z-index: 5000; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        /* MODAIS E AGENDA */
        #list-contatos, #view-perfil-full { 
            position: absolute; inset: 0; background: rgba(0,0,0,0.85); 
            z-index: 20000; padding: 20px; display: none; flex-direction: column; align-items: center;
            backdrop-filter: blur(10px);
        }

        .btn-footer {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 60px; height: 40px; background: #b30000; border-radius: 10px;
            border: 2px solid #500; z-index: 10000; cursor: pointer;
            box-shadow: 0 0 10px red;
        }

        #screen-login { position: fixed; inset: 0; background: #000; z-index: 30000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div class="app-main" id="main-canvas">
    <video id="video-remote" autoplay playsinline></video>
    <video id="video-local" autoplay playsinline muted></video>

    <div class="notch-container">
        <div class="notch" onclick="abrirConfigPerfil()">
            <img id="header-pic-circle" src="">
            <div class="info-notch">
                <span class="label-perfil" id="label-nome-topo">PERFIL</span>
                <span class="id-notch" id="label-id-topo">ID: ---</span>
            </div>
        </div>
    </div>

    <div class="aba-menu" onclick="toggleMenu()">MENU</div>

    <div id="contatos-na-tela" style="position: absolute; inset: 0; z-index: 4000; pointer-events: none;">
        </div>

    <div class="btn-footer" onclick="abrirAgenda()"></div>
</div>

<div id="view-perfil-full">
    <img id="img-full-edit" style="width:180px; height:180px; border-radius:20px; object-fit:cover;">
    <button style="width:80%; padding:15px; margin-top:20px; background:var(--primary); color:white; border-radius:10px;" onclick="document.getElementById('change-photo-input').click()">MUDAR MINHA FOTO</button>
    <button style="width:80%; padding:15px; margin-top:10px; background:var(--orange); color:black;" onclick="document.getElementById('gallery-to-screen').click()">IMAGEM NA TELA</button>
    <button style="width:80%; padding:15px; margin-top:30px; background:red; color:white;" onclick="fecharPerfil()">FECHAR</button>
</div>

<div id="list-contatos">
     <h2 style="color:white">AGENDA</h2>
     <div id="contatos-render" style="width:100%"></div>
     <button onclick="document.getElementById('list-contatos').style.display='none'" style="margin-top:20px; padding:15px; width:80%; background:#333; color:white;">VOLTAR</button>
</div>

<div id="screen-login">
    <h1 style="color:var(--led-blue)">VIDEO CALL PRO</h1>
    <div onclick="document.getElementById('my-photo-input').click()" style="width:120px; height:120px; border-radius:50%; border:3px solid white; overflow:hidden; background:#222;">
        <img id="preview-foto-login" style="display:none; width:100%; height:100%; object-fit:cover;">
    </div>
    <input type="text" id="input-nome" placeholder="NOME" style="width:80%; padding:15px; margin-top:20px; border-radius:10px; text-align:center;">
    <input type="number" id="input-id" oninput="buscarDadosAuto(this.value)" placeholder="SEU ID" style="width:80%; padding:15px; margin-top:10px; border-radius:10px; text-align:center;">
    <button onclick="entrar()" style="width:80%; padding:20px; margin-top:20px; background:var(--primary); color:white; font-weight:bold; border-radius:15px;">INICIAR SISTEMA</button>
</div>

<input type="file" id="my-photo-input" accept="image/*" style="display:none" onchange="processarFoto(this, 'login')">
<input type="file" id="change-photo-input" accept="image/*" style="display:none" onchange="processarFoto(this, 'edit')">
<input type="file" id="gallery-to-screen" accept="image/*" style="display:none" onchange="imgParaTela(this)">

<script>
    const firebaseConfig = { apiKey: "AIzaJ4WY8pvL7cAgXIZpSkIDk1Oy4rbsb92mgNN", databaseURL: "https://netbase-cloud-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    let peer, localStream, currentCall, meuID = "", minhaFoto = "", meuNome = "";

    function buscarDadosAuto(id) {
        if(id.length < 3) return;
        database.ref('perfis/'+id).once('value', snap => {
            if(snap.exists()){
                const d = snap.val();
                document.getElementById('input-nome').value = d.nome;
                if(d.foto) { minhaFoto = d.foto; document.getElementById('preview-foto-login').src = d.foto; document.getElementById('preview-foto-login').style.display = 'block'; }
            }
        });
    }

    async function entrar() {
        meuID = document.getElementById('input-id').value;
        meuNome = document.getElementById('input-nome').value;
        if(!meuID || !meuNome) return alert("Preencha tudo");
        database.ref('perfis/'+meuID).update({ nome: meuNome, foto: minhaFoto });
        peer = new Peer(meuID);
        peer.on('open', () => {
            document.getElementById('screen-login').style.display = 'none';
            document.getElementById('label-nome-topo').innerText = meuNome;
            document.getElementById('label-id-topo').innerText = "ID: " + meuID;
            if(minhaFoto) { document.getElementById('header-pic-circle').src = minhaFoto; }
            ativarCamera(); sincronizarContatos();
        });
        peer.on('call', call => {
            if(confirm("Atender vídeo de " + call.peer + "?")) {
                call.answer(localStream);
                call.on('stream', s => { document.getElementById('video-remote').srcObject = s; });
                currentCall = call;
            }
        });
    }

    async function ativarCamera() {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('video-local').srcObject = localStream;
            document.getElementById('video-local').style.display = 'block';
        } catch(e) { alert("Câmera não disponível"); }
    }

    function fixarNaTela(nome, id, foto) {
        const card = document.createElement('div');
        card.className = 'floating-contact';
        card.style.pointerEvents = 'auto';
        card.style.top = "160px"; card.style.left = "40px";
        card.innerHTML = `<img src="${foto}" style="width:55px; height:55px; border-radius:50%; object-fit:cover; border:2px solid var(--led-blue);">
        <div style="color:white; font-size:11px; margin:5px 0; font-weight:bold;">${nome}</div>
        <button onclick="ligarPara('${id}')" style="background:var(--led-green); border:none; border-radius:8px; width:100%; padding:5px; font-weight:bold; font-size:10px;">VÍDEO</button>`;
        
        let startX = 0;
        card.ontouchstart = (e) => startX = e.touches[0].clientX;
        card.ontouchmove = (e) => {
            let dist = e.touches[0].clientX - startX;
            if(dist > 70) { card.style.transform = "translateX(300%) opacity(0)"; setTimeout(() => card.remove(), 300); }
        };
        document.getElementById('contatos-na-tela').appendChild(card);
        document.getElementById('list-contatos').style.display = 'none';
    }

    function imgParaTela(input) {
        const reader = new FileReader();
        reader.onload = e => {
            const card = document.createElement('div');
            card.className = 'floating-img';
            card.style.pointerEvents = 'auto';
            card.style.top = "200px"; card.style.right = "40px";
            card.innerHTML = `<img src="${e.target.result}" style="width:100%; border-radius:10px;">`;
            let startX = 0;
            card.ontouchstart = (ev) => startX = ev.touches[0].clientX;
            card.ontouchmove = (ev) => { if(ev.touches[0].clientX - startX > 70) card.remove(); };
            document.getElementById('contatos-na-tela').appendChild(card);
            fecharPerfil();
        };
        reader.readAsDataURL(input.files[0]);
    }

    function ligarPara(id) {
        const call = peer.call(id, localStream);
        call.on('stream', s => { document.getElementById('video-remote').srcObject = s; });
        currentCall = call;
    }

    function sincronizarContatos() {
        database.ref('agenda/' + meuID).on('value', snap => {
            const render = document.getElementById('contatos-render'); render.innerHTML = "";
            snap.forEach(c => {
                const con = c.val();
                render.innerHTML += `<div style="display:flex; align-items:center; justify-content:space-between; background:rgba(255,255,255,0.1); margin:5px; padding:10px; border-radius:10px;">
                    <div style="display:flex; align-items:center; gap:10px; color:white;" onclick="fixarNaTela('${con.nome}','${con.id}','${con.foto}')">
                        <img src="${con.foto}" style="width:45px; height:45px; border-radius:50%; object-fit:cover;"><b>${con.nome}</b>
                    </div>
                    <button onclick="excluirContato('${con.id}')" style="background:red; color:white; border:none; padding:5px 10px; border-radius:5px;">X</button></div>`;
            });
        });
    }

    function processarFoto(input, modo) {
        const reader = new FileReader();
        reader.onload = e => {
            minhaFoto = e.target.result;
            if(modo === 'login') { document.getElementById('preview-foto-login').src = minhaFoto; document.getElementById('preview-foto-login').style.display = 'block'; }
            else { document.getElementById('img-full-edit').src = minhaFoto; document.getElementById('header-pic-circle').src = minhaFoto; database.ref('perfis/'+meuID).update({ foto: minhaFoto }); }
        };
        reader.readAsDataURL(input.files[0]);
    }

    function abrirConfigPerfil() { document.getElementById('img-full-edit').src = minhaFoto; document.getElementById('view-perfil-full').style.display = 'flex'; }
    function fecharPerfil() { document.getElementById('view-perfil-full').style.display = 'none'; }
    function abrirAgenda() { document.getElementById('list-contatos').style.display = 'flex'; }
    function toggleMenu() { alert("Menu de Opções em breve!"); }
    function excluirContato(id) { if(confirm("Remover?")) database.ref('agenda/'+meuID+'/'+id).remove(); }
</script>
</body>
</html>
